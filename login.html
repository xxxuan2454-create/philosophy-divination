<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 哲学占卜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8dcc8;
  font-family: 'Georgia', 'STSong', '宋体', serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.box {
  background: linear-gradient(160deg, #f8f0da, #fffcf0);
  border: 2px solid #c8a84b;
  border-radius: 16px;
  padding: 44px 40px 40px;
  width: 360px;
  box-shadow: 0 12px 40px rgba(0,0,0,.18);
  text-align: center;
}
.logo { font-size: 28px; color: #2a1800; letter-spacing: 8px; margin-bottom: 6px; }
.sub  { font-size: 11px; color: #a08050; letter-spacing: 2px; margin-bottom: 28px; }
.orn  { color: #c8a040; letter-spacing: 8px; font-size: 14px; margin-bottom: 28px; }

.tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1.5px solid rgba(139,105,20,.3); border-radius: 8px; overflow: hidden; }
.tab {
  flex: 1; padding: 9px; font-size: 13px; font-family: inherit;
  background: transparent; border: none; cursor: pointer;
  color: #9a7848; letter-spacing: 1px; transition: all .2s;
}
.tab.active { background: linear-gradient(160deg,#9e4510,#7a2e05); color: #f8edd5; }

label { display: block; font-size: 12px; color: #7a5c2a; text-align: left; margin-bottom: 6px; letter-spacing: 1px; }
input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid rgba(139,105,20,.35); border-radius: 8px;
  font-size: 15px; font-family: inherit;
  background: rgba(255,252,240,.8); color: #2a1800;
  outline: none; transition: border-color .2s; margin-bottom: 16px;
}
input:focus { border-color: #c8a050; }
input::placeholder { color: #b09870; }

.submit-btn {
  width: 100%;
  background: linear-gradient(160deg, #9e4510, #7a2e05);
  color: #f8edd5; border: none; border-radius: 10px;
  padding: 14px; font-size: 16px; font-family: inherit;
  cursor: pointer; letter-spacing: 3px; transition: all .2s; margin-top: 4px;
}
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 18px rgba(0,0,0,.25); }
.submit-btn:disabled { opacity: .45; cursor: default; }

.msg { font-size: 13px; margin-top: 14px; min-height: 20px; }
.msg.err { color: #c03020; }
.msg.ok  { color: #4a7a1a; }

.back-link { display: block; margin-top: 20px; font-size: 12px; color: #a08050; text-decoration: none; letter-spacing: 1px; }
.back-link:hover { color: #6a4020; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">哲学占卜</div>
  <div class="sub">PHILOSOPHICAL DIVINATION</div>
  <div class="orn">✦ ✦ ✦</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">登录</button>
    <button class="tab" onclick="switchTab('register')">注册</button>
  </div>

  <div>
    <label>邮箱</label>
    <input id="email" type="email" placeholder="your@email.com" />
    <label>密码</label>
    <input id="password" type="password" placeholder="至少 6 位" />
    <div id="confirm-wrap" style="display:none">
      <label>确认密码</label>
      <input id="confirm" type="password" placeholder="再输入一次" />
    </div>
    <button class="submit-btn" id="submit-btn" onclick="doSubmit()">登录</button>
    <div id="msg" class="msg"></div>
  </div>

  <a href="/" class="back-link">← 返回占卜</a>
</div>

<script>
let mode = 'login';

function switchTab(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0) === (m==='login')));
  document.getElementById('confirm-wrap').style.display = m === 'register' ? 'block' : 'none';
  document.getElementById('submit-btn').textContent = m === 'login' ? '登录' : '注册';
  document.getElementById('msg').textContent = '';
}

function showMsg(text, type = 'err') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function doSubmit() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  if (!email || !password) { showMsg('请填写邮箱和密码'); return; }

  if (mode === 'register') {
    const confirm = document.getElementById('confirm').value;
    if (password !== confirm) { showMsg('两次密码不一致'); return; }
    if (password.length < 6) { showMsg('密码至少 6 位'); return; }
  }

  btn.disabled = true;
  btn.textContent = mode === 'login' ? '登录中…' : '注册中…';

  try {
    const url = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || '操作失败'); btn.disabled = false; btn.textContent = mode === 'login' ? '登录' : '注册'; return; }

    localStorage.setItem('zb_token', data.token);
    window.location.href = '/';
  } catch {
    showMsg('网络错误，请重试');
    btn.disabled = false;
    btn.textContent = mode === 'login' ? '登录' : '注册';
  }
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(); });
document.getElementById('confirm') && document.getElementById('confirm').addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(); });
</script>
</body>
</html>
