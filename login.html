<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 哲学占卜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8dcc8;
  font-family: 'Georgia', 'STSong', '宋体', serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.box {
  background: linear-gradient(160deg, #f8f0da, #fffcf0);
  border: 2px solid #c8a84b;
  border-radius: 16px;
  padding: 44px 40px 40px;
  width: 360px;
  box-shadow: 0 12px 40px rgba(0,0,0,.18);
  text-align: center;
}
.logo { font-size: 28px; color: #2a1800; letter-spacing: 8px; margin-bottom: 6px; }
.sub  { font-size: 11px; color: #a08050; letter-spacing: 2px; margin-bottom: 32px; }
.orn  { color: #c8a040; letter-spacing: 8px; font-size: 14px; margin-bottom: 28px; }

label { display: block; font-size: 12px; color: #7a5c2a; text-align: left; margin-bottom: 6px; letter-spacing: 1px; }
input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid rgba(139,105,20,.35);
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  background: rgba(255,252,240,.8);
  color: #2a1800;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 16px;
}
input:focus { border-color: #c8a050; }
input::placeholder { color: #b09870; }

.phone-row { display: flex; gap: 8px; align-items: flex-start; }
.phone-row input { margin-bottom: 0; flex: 1; }
#send-btn {
  white-space: nowrap;
  background: rgba(139,105,20,.12);
  border: 1.5px solid rgba(139,105,20,.4);
  border-radius: 8px;
  padding: 11px 14px;
  font-size: 13px;
  font-family: inherit;
  color: #7a5c2a;
  cursor: pointer;
  transition: background .2s;
  flex-shrink: 0;
  margin-bottom: 16px;
}
#send-btn:hover:not(:disabled) { background: rgba(139,105,20,.22); }
#send-btn:disabled { opacity: .5; cursor: default; }

.submit-btn {
  width: 100%;
  background: linear-gradient(160deg, #9e4510, #7a2e05);
  color: #f8edd5;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 16px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 3px;
  transition: all .2s;
  margin-top: 4px;
}
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 18px rgba(0,0,0,.25); }
.submit-btn:disabled { opacity: .45; cursor: default; }

.msg { font-size: 13px; margin-top: 14px; min-height: 20px; }
.msg.err  { color: #c03020; }
.msg.ok   { color: #4a7a1a; }

.back-link { display: block; margin-top: 20px; font-size: 12px; color: #a08050; text-decoration: none; letter-spacing: 1px; }
.back-link:hover { color: #6a4020; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">哲学占卜</div>
  <div class="sub">PHILOSOPHICAL DIVINATION</div>
  <div class="orn">✦ ✦ ✦</div>

  <div>
    <label>手机号</label>
    <div class="phone-row">
      <input id="phone" type="tel" placeholder="请输入手机号" maxlength="11" />
      <button id="send-btn" onclick="sendCode()">发送验证码</button>
    </div>

    <label>验证码</label>
    <input id="code" type="text" placeholder="6 位验证码" maxlength="6" />

    <button class="submit-btn" onclick="doLogin()">登录 / 注册</button>
    <div id="msg" class="msg"></div>
  </div>

  <a href="/" class="back-link">← 返回占卜</a>
</div>

<script>
let countdown = 0;

function showMsg(text, type = 'err') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function sendCode() {
  const phone = document.getElementById('phone').value.trim();
  if (!/^1[3-9]\d{9}$/.test(phone)) { showMsg('请输入正确的手机号'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || '发送失败'); btn.disabled = false; return; }
    showMsg('验证码已发送，5 分钟内有效', 'ok');
    startCountdown(btn);
  } catch {
    showMsg('网络错误，请重试');
    btn.disabled = false;
  }
}

function startCountdown(btn) {
  countdown = 60;
  btn.textContent = `${countdown}s`;
  const timer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.textContent = '重新发送';
    } else {
      btn.textContent = `${countdown}s`;
    }
  }, 1000);
}

async function doLogin() {
  const phone = document.getElementById('phone').value.trim();
  const code  = document.getElementById('code').value.trim();
  if (!phone || !code) { showMsg('请填写手机号和验证码'); return; }

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '验证中…';

  try {
    const res = await fetch('/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, code })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || '验证失败'); btn.disabled = false; btn.textContent = '登录 / 注册'; return; }

    localStorage.setItem('zb_token', data.token);
    window.location.href = '/';
  } catch {
    showMsg('网络错误，请重试');
    btn.disabled = false;
    btn.textContent = '登录 / 注册';
  }
}

document.getElementById('code').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
