<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哲学占卜</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ede0c8;
  font-family: 'Georgia', 'STSong', '宋体', serif;
  min-height: 100vh;
  min-height: 100dvh;
  user-select: none;
  overflow: hidden;
}

/* ══════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════ */
.screen {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
}
.screen.active { display: flex; }

/* ══════════════════════════════════════
   SCREEN 1 — SPREAD SELECTION
══════════════════════════════════════ */
#screen-spread {
  background: #e8dcc8;
  align-items: center;
  justify-content: center;
  gap: 0;
}

.spread-box {
  background: transparent;
  border: none;
  padding: 0;
  text-align: center;
  width: 520px;
}

.spread-box h1 {
  font-size: 42px;
  color: #2a1800;
  letter-spacing: 10px;
  font-weight: normal;
  margin-bottom: 10px;
}
.spread-box .tagline {
  font-size: 12px;
  color: #a08050;
  font-style: normal;
  letter-spacing: 0.5px;
  line-height: 1.8;
  margin-bottom: 10px;
  max-width: 360px;
  margin-left: auto;
  margin-right: auto;
}

/* thin decorative line under tagline */
.spread-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, #c8a84b, transparent);
  margin: 0 auto 36px;
}

.spread-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.spread-btn {
  background: #fdf6e8;
  border: 1.5px solid rgba(160,125,55,.5);
  border-radius: 10px;
  padding: 18px 10px;
  cursor: pointer;
  transition: all 0.22s;
  font-family: inherit;
  box-shadow: 0 2px 8px rgba(0,0,0,.10), 0 1px 0 rgba(255,255,255,.8) inset;
}
.spread-btn:hover {
  background: #fff;
  border-color: #b8922e;
  transform: translateY(-3px);
  box-shadow: 0 8px 22px rgba(160,120,40,.22);
}
.spread-btn .sname {
  display: block; font-size: 16px; font-weight: bold; color: #1e1000; letter-spacing: 1px;
}
.spread-btn .sdesc {
  display: block; font-size: 10px; color: #8a6838; margin-top: 6px; line-height: 1.6; letter-spacing: 0.5px;
}

/* ══════════════════════════════════════
   SCREEN 2 — CARD DECK
══════════════════════════════════════ */
#screen-deck { flex-direction: row; background: #ede0c8; }

/* ══════════════════════════════════════
   CARD GRID AREA
══════════════════════════════════════ */
#grid-area {
  flex: 1;
  padding: 18px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  align-content: flex-start;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ══════════════════════════════════════
   INDIVIDUAL CARD
══════════════════════════════════════ */
.card {
  width: 82px;
  height: 124px;
  perspective: 700px;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.2s, opacity 0.2s;
  position: relative;
}

/* Shuffle rotation – varied by position */
.card:nth-child(7n+1) { transform: rotate(-2.1deg); }
.card:nth-child(7n+2) { transform: rotate(1.4deg); }
.card:nth-child(7n+3) { transform: rotate(-0.7deg); }
.card:nth-child(7n+4) { transform: rotate(2.3deg); }
.card:nth-child(7n+5) { transform: rotate(-1.6deg); }
.card:nth-child(7n+6) { transform: rotate(0.9deg); }
.card:nth-child(7n+0) { transform: rotate(-1.1deg); }

.card:hover:not(.disabled):not(.chosen) {
  transform: rotate(0deg) translateY(-6px) scale(1.05) !important;
  z-index: 10;
}

.card.chosen {
  transform: rotate(0deg) translateY(-12px) scale(1.06) !important;
  opacity: 0.65;
  z-index: 5;
}

.card.chosen::after {
  content: attr(data-order);
  position: absolute;
  top: -8px; right: -8px;
  background: #8b4513;
  color: #f5e0a0;
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: 10px;
  font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  font-family: sans-serif;
  z-index: 20;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

/* Extra card chosen from deck */
.card.extra-chosen {
  transform: rotate(0deg) translateY(-12px) scale(1.06) !important;
  opacity: 0.65;
}
.card.extra-chosen::after {
  content: '补';
  background: #5a2880;
  color: #e8d0ff;
}
/* Pulse highlight on cards available for extra pick */
.card.extra-available {
  animation: extraPulse 1.2s ease-in-out infinite alternate;
  cursor: pointer !important;
}
@keyframes extraPulse {
  from { box-shadow: 0 0 0 0 rgba(140,80,200,0); }
  to   { box-shadow: 0 0 10px 3px rgba(140,80,200,0.45); }
}

.card.disabled { cursor: default; pointer-events: none; }

.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-back, .card-front {
  position: absolute; inset: 0;
  border-radius: 7px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* ── Card Back ── */
.card-back {
  background:
    repeating-linear-gradient(45deg,  rgba(55,45,0,.11) 0, rgba(55,45,0,.11) 1px, transparent 0, transparent 9px),
    repeating-linear-gradient(135deg, rgba(55,45,0,.11) 0, rgba(55,45,0,.11) 1px, transparent 0, transparent 9px),
    linear-gradient(155deg, #a8b05c 0%, #c8c878 20%, #d8d080 50%, #c0b868 78%, #a0a850 100%);
  border: 2.5px solid #6a7228;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.card-back::before {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid rgba(70,60,5,.42);
  border-radius: 4px;
  pointer-events: none;
}
.card-back::after {
  content: '';
  position: absolute; inset: 7px;
  border: 0.5px solid rgba(70,60,5,.22);
  border-radius: 2px;
  pointer-events: none;
}
.back-top  { position: absolute; top: 10px;    font-size: 6.5px; letter-spacing: 1px; font-weight: bold; color: rgba(35,28,0,.72); }
.back-orn  { font-size: 28px; color: rgba(45,38,0,.6); line-height: 1; }
.back-bot  { position: absolute; bottom: 9px;  font-size: 6.5px; letter-spacing: 1px; font-weight: bold; color: rgba(35,28,0,.72); }
.back-c    { position: absolute; font-size: 11px; color: rgba(160,28,28,.72); }
.back-c.tl { top: 5px;    left: 6px;  }
.back-c.tr { top: 5px;    right: 6px; }
.back-c.bl { bottom: 5px; left: 6px;  }
.back-c.br { bottom: 5px; right: 6px; }

/* ── Card Front (in grid, not used directly, but kept for completeness) ── */
.card-front {
  background: linear-gradient(155deg, #f8f0da 0%, #fffcf0 55%, #f0e8d0 100%);
  border: 2.5px solid #8b6914;
  transform: rotateY(180deg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 5px 16px;
  text-align: center;
  overflow: hidden;
}
.card-front::before {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid rgba(139,105,20,.38);
  border-radius: 4px;
  pointer-events: none;
}
.cf-num  { position: absolute; top: 6px; left: 7px; font-size: 7.5px; color: #8b6914; }
.cf-sym  { font-size: 19px; margin-bottom: 3px; }
.cf-name { font-size: 12px; font-weight: bold; color: #1c0e00; line-height: 1.3; }
.cf-sub  { font-size: 7px; color: #8b6020; font-style: italic; margin-top: 2px; line-height: 1.4; max-width: 68px; }
.cf-kw   { font-size: 7.5px; color: #5a4020; margin-top: 4px; line-height: 1.5; }
.cf-hint { position: absolute; bottom: 5px; font-size: 6.5px; color: #8b6014; font-style: italic; padding: 0 5px; line-height: 1.3; }

/* ══════════════════════════════════════
   MAX-CARDS MODAL (Infinite mode)
══════════════════════════════════════ */
#max-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(35,20,5,.72);
  z-index: 350;
  align-items: center; justify-content: center;
}
#max-modal.active { display: flex; }

.max-box {
  background: linear-gradient(160deg, #f8edd5, #fff9ec);
  border: 2px solid #c8a84b;
  border-radius: 12px;
  padding: 36px 44px;
  text-align: center;
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
  min-width: 300px;
}
.max-box h3 { font-size: 20px; color: #2a1800; letter-spacing: 2px; margin-bottom: 8px; }
.max-box p  { font-size: 12px; color: #9a7848; margin-bottom: 24px; line-height: 1.7; }

.max-slider-wrap {
  display: flex; align-items: center; gap: 14px; justify-content: center; margin-bottom: 10px;
}
#max-slider {
  -webkit-appearance: none;
  width: 180px; height: 4px;
  background: linear-gradient(to right, #c8a84b 0%, #c8a84b var(--pct, 33%), #d8cba0 var(--pct, 33%));
  border-radius: 2px; outline: none; cursor: pointer;
}
#max-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #8b6914;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
}
#max-display {
  font-size: 28px; font-weight: bold; color: #8b3c0a;
  min-width: 36px; text-align: center;
}
.max-hint { font-size: 10px; color: #b09050; margin-bottom: 22px; }

.max-start-btn {
  background: linear-gradient(160deg, #9e4510, #7a2e05);
  color: #f8edd5; border: none; border-radius: 8px;
  padding: 11px 28px; font-size: 15px; font-family: inherit;
  cursor: pointer; letter-spacing: 2px; transition: all 0.2s;
}
.max-start-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(0,0,0,.25); }

/* ── Infinite bottom display ── */
#infinite-bar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(30, 18, 4, 0.92);
  border-top: 1px solid #c8a84b;
  padding: 14px 20px 16px;
  z-index: 50;
  flex-direction: column;
  gap: 10px;
}
#infinite-bar.active { display: flex; }

#infinite-bar-header {
  display: flex; align-items: center; justify-content: space-between;
}
#infinite-counter {
  font-size: 12px; color: #c8a040; letter-spacing: 2px; font-family: sans-serif;
}
#infinite-bar-cards {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
}
#infinite-bar-cards::-webkit-scrollbar { height: 3px; }
#infinite-bar-cards::-webkit-scrollbar-thumb { background: #c8a84b; border-radius: 2px; }

/* Card in infinite bar — same look as result cards */
.ibar-card-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  flex-shrink: 0;
  cursor: pointer;
  animation: revealCard 0.45s ease both;
}
.ibar-pos { font-size: 9px; color: #b09050; letter-spacing: 1px; font-family: sans-serif; }

/* Grid scrollable when bar is visible */
#screen-deck.infinite-active #grid-area {
  overflow-y: auto;
  padding-bottom: 230px;
}
#screen-deck.infinite-active #grid-area::-webkit-scrollbar { width: 4px; }
#screen-deck.infinite-active #grid-area::-webkit-scrollbar-thumb { background: #c8a84b; border-radius: 2px; }

#infinite-done-btn {
  display: none;
  background: rgba(200,168,75,.2);
  border: 1px solid #c8a84b;
  border-radius: 6px;
  padding: 6px 16px;
  color: #f0d890;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
}
#infinite-done-btn:hover { background: rgba(200,168,75,.35); }

/* Card flash animation for infinite draw */
@keyframes cardFlash {
  0%   { box-shadow: 0 0 0 0 rgba(200,168,75,0); transform: scale(1); }
  40%  { box-shadow: 0 0 18px 6px rgba(200,168,75,.6); transform: scale(1.08); }
  100% { box-shadow: 0 0 0 0 rgba(200,168,75,0); transform: scale(1); }
}
.card.flash { animation: cardFlash 0.45s ease; }

/* ══════════════════════════════════════
   RIGHT PANEL
══════════════════════════════════════ */
#right-panel {
  width: 280px;
  min-width: 280px;
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  border-left: 1px solid #c8a84b;
  background: rgba(238,220,185,.45);
}

#change-btn {
  align-self: flex-end;
  background: #3e2208;
  color: #f5e8c8;
  border: none;
  border-radius: 6px;
  padding: 9px 16px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 2px;
  transition: background 0.2s;
}
#change-btn:hover { background: #6a3810; }

#instruction {
  font-size: 22px;
  font-weight: bold;
  color: #1e1000;
  line-height: 1.55;
}
#needed-count {
  font-size: 52px;
  color: #8b3c0a;
  display: block;
  line-height: 1;
}
#progress { font-size: 13px; color: #7a5c2a; min-height: 20px; }

#reveal-btn {
  display: none;
  background: linear-gradient(160deg, #9e4510, #7a2e05);
  color: #f8edd5;
  border: none;
  border-radius: 8px;
  padding: 13px 20px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
#reveal-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(0,0,0,.3); }

/* ══════════════════════════════════════
   RESULTS OVERLAY
══════════════════════════════════════ */
#results-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(20, 10, 0, 0.88);
  z-index: 200;
  overflow-y: auto;
  padding: 36px 20px 50px;
  flex-direction: column;
  align-items: center;
}
#results-overlay.active { display: flex; }

.res-title {
  color: #f0d890;
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.res-spread-name {
  color: #c8a040;
  font-size: 22px;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.ornament { color: #c8a040; font-size: 16px; letter-spacing: 10px; margin: 10px 0 24px; }

/* ── Result card (large) ── */
.result-card-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.result-card-wrap:hover .result-card { box-shadow: 0 6px 24px rgba(200,168,75,.5); }

.result-card {
  width: 120px;
  height: 210px;
  background: linear-gradient(155deg, #f8f0da 0%, #fffcf0 55%, #f0e8d0 100%);
  border: 2.5px solid #8b6914;
  border-radius: 8px;
  padding: 12px 8px 10px;
  text-align: center;
  position: relative;
  box-shadow: 0 4px 18px rgba(0,0,0,.45);
  animation: revealCard 0.5s ease both;
  overflow: hidden;
  transition: box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.result-card::before {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid rgba(139,105,20,.3);
  border-radius: 4px;
  pointer-events: none;
}

@keyframes revealCard {
  from { opacity: 0; transform: rotateY(90deg) scale(0.85); }
  to   { opacity: 1; transform: rotateY(0)     scale(1);    }
}

/* Reversed card – rotate everything inside 180deg */
.result-card.reversed .card-content-inner {
  transform: rotate(180deg);
}
.result-card.reversed {
  border-color: #6a4090;
  box-shadow: 0 4px 18px rgba(100,60,140,.4);
}

.card-content-inner {
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  transition: transform 0s;
}

.result-card.reversed .card-content-inner {
  /* keep full size when rotated */
  width: 100%;
  height: 100%;
}

.rc-pos {
  font-size: 8.5px;
  color: #8b6914;
  letter-spacing: 1px;
  margin-bottom: 7px;
  font-family: sans-serif;
}
.rc-orientation {
  font-size: 7.5px;
  font-family: sans-serif;
  margin-bottom: 6px;
  font-weight: bold;
}
.rc-orientation.upright  { color: #4a7a1a; }
.rc-orientation.reversed { color: #6a4090; }

.rc-sym  { font-size: 26px; margin-bottom: 5px; }
.rc-name { font-size: 15px; font-weight: bold; color: #1c0e00; line-height: 1.3; }
.rc-sub  { font-size: 8px; color: #8b6020; font-style: italic; margin-top: 3px; line-height: 1.4; }
.rc-kw   { font-size: 8px; color: #5a4020; margin-top: 6px; line-height: 1.6; }
.rc-hint {
  font-size: 8px; color: #6b4810; font-style: italic;
  margin-top: 6px; padding-top: 6px;
  border-top: 1px solid rgba(139,105,20,.28);
  line-height: 1.5;
}

.pos-label {
  font-size: 10px;
  color: #b09050;
  letter-spacing: 1px;
  font-family: sans-serif;
  text-align: center;
}

/* ══════════════════════════════════════
   SCREEN 3 — ALL CARDS BROWSER
══════════════════════════════════════ */
#screen-cards {
  background: #ede0c8;
  overflow-y: auto;
}

.cards-browser-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 32px 16px;
  border-bottom: 1px solid #c8a84b;
  background: rgba(240,225,190,.7);
  position: sticky;
  top: 0;
  z-index: 10;
}

.cards-browser-header h2 {
  font-size: 22px;
  color: #2c1400;
  letter-spacing: 4px;
  flex: 1;
  text-align: center;
}

.back-btn {
  background: #3e2208;
  color: #f5e8c8;
  border: none;
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
  white-space: nowrap;
}
.back-btn:hover { background: #6a3810; }

#cards-browser-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 28px 32px 40px;
  justify-content: center;
}

/* Browser card — front face always visible */
.browser-card {
  width: 110px;
  background: linear-gradient(155deg, #f8f0da 0%, #fffcf0 55%, #f0e8d0 100%);
  border: 2.5px solid #8b6914;
  border-radius: 8px;
  padding: 14px 8px 10px;
  text-align: center;
  position: relative;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.browser-card::before {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid rgba(139,105,20,.32);
  border-radius: 4px;
  pointer-events: none;
}
.browser-card:hover {
  transform: translateY(-5px) scale(1.04);
  box-shadow: 0 8px 22px rgba(0,0,0,.28);
}
.bc-num  { position: absolute; top: 6px; left: 8px; font-size: 8px; color: #8b6914; }
.bc-sym  { font-size: 22px; margin-bottom: 5px; }
.bc-name { font-size: 13px; font-weight: bold; color: #1c0e00; line-height: 1.3; }
.bc-sub  { font-size: 7.5px; color: #8b6020; font-style: italic; margin-top: 3px; line-height: 1.4; }
.bc-kw   { font-size: 7.5px; color: #5a4020; margin-top: 5px; line-height: 1.6; }
.bc-hint { font-size: 7px; color: #6b4810; font-style: italic; margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(139,105,20,.25); line-height: 1.4; }

/* ── Spread layout containers ── */
.spread-linear { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

.spread-cross {
  display: grid;
  grid-template-areas: ". top ." "lft ctr rgt" ". bot .";
  grid-template-columns: 134px 134px 134px;
  grid-template-rows: auto auto auto;
  gap: 12px;
}

.spread-h {
  display: grid;
  grid-template-areas: "a . d" "b e f" "c . g";
  grid-template-columns: 134px 134px 134px;
  grid-template-rows: auto auto auto;
  gap: 12px;
}

.spread-9 {
  display: grid;
  grid-template-columns: repeat(3, 134px);
  gap: 12px;
}

/* Results actions */
.results-actions {
  margin-top: 28px;
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.res-btn {
  background: linear-gradient(160deg, #c8a84b, #a07828);
  border: 2px solid #8b6914;
  border-radius: 8px;
  padding: 10px 22px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  color: #1c0e00;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.res-btn:hover { background: linear-gradient(160deg, #a07828, #7a5c18); color: #f8edd5; }
.res-btn.ghost {
  background: transparent;

/* ══════════════════════════════════════
   CARD DETAIL MODAL
══════════════════════════════════════ */
#card-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,5,0,.97);
  z-index: 2000;
  align-items: center; justify-content: center;
}
#card-modal.active { display: flex; }

.modal-card {
  max-width: 520px;
  width: 92vw;
  background: linear-gradient(155deg, #f8f0da 0%, #fffcf0 55%, #f0e8d0 100%);
  border: 3px solid #8b6914;
  border-radius: 14px;
  padding: 28px 22px 32px;
  text-align: center;
  position: relative;
  box-shadow: 0 12px 50px rgba(0,0,0,.7);
  animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  /* Use svh (small viewport height) for reliable mobile fit;
     fall back to vh in older browsers */
  max-height: 88vh;
  max-height: 88svh;
  overflow-y: auto;
}
.modal-card::-webkit-scrollbar { width: 4px; }
.modal-card::-webkit-scrollbar-thumb { background: rgba(139,105,20,.35); border-radius: 2px; }
/* inset outline stays fixed to the card edge regardless of scroll position */
.modal-card { outline: 1.5px solid rgba(139,105,20,.35); outline-offset: -10px; }

@keyframes modalPop {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1);   }
}

.modal-pos       { font-size: 11px; color: #8b6914; letter-spacing: 2px; margin-bottom: 10px; font-family: sans-serif; }
.modal-orient    { font-size: 10px; font-weight: bold; margin-bottom: 12px; font-family: sans-serif; }
.modal-orient.upright  { color: #4a7a1a; }
.modal-orient.reversed { color: #6a4090; }
.modal-sym       { font-size: 52px; margin-bottom: 10px; }
.modal-name      { font-size: 28px; font-weight: bold; color: #1c0e00; line-height: 1.2; }
.modal-sub       { font-size: 12px; color: #8b6020; font-style: italic; margin-top: 5px; line-height: 1.4; }
.modal-divider   { width: 60px; height: 1px; background: rgba(139,105,20,.4); margin: 14px auto; }
.modal-kw        { font-size: 13px; color: #5a4020; line-height: 1.8; }
.modal-hint      { font-size: 11px; color: #6b4810; font-style: italic; margin-top: 12px; line-height: 1.6; }

.modal-close-btn {
  position: absolute;
  top: 10px; right: 12px;
  background: none;
  border: none;
  font-size: 22px;
  color: #9a7848;
  cursor: pointer;
  line-height: 1;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color 0.15s;
}
.modal-close-btn:hover { color: #4a2800; }

.modal-close-hint {
  color: #9a7848;
  font-size: 11px;
  font-family: sans-serif;
  letter-spacing: 1px;
  margin-top: 20px;
  padding-bottom: 4px;
}

/* ── 结果页 AI 整体解牌区 ── */
.res-ai-section {
  width: 100%;
  max-width: 560px;
  margin: 32px auto 0;
  padding: 24px 20px 20px;

  text-align: center;
}
.res-ai-title {
  font-size: 11px;
  color: #c8a050;
  letter-spacing: 4px;
  font-family: sans-serif;
  margin-bottom: 16px;
}
.res-ai-textarea {
  width: 100%;
  min-height: 72px;

.res-ai-btn {

.modal-divination {

.modal-philosopher-name {

/* ══════════════════════════════════════
   MOBILE RESPONSIVE  (≤ 640px)
══════════════════════════════════════ */
@media (max-width: 640px) {
  /* Use dynamic viewport height to avoid Safari chrome overlap */
  .screen {
    position: fixed;
    inset: 0;
    height: 100dvh;
  }

  /* Spread selection — narrow the box */
  .spread-box {
    width: 100%;
    padding: 0 18px;
  }
  .spread-box h1 { font-size: 32px; letter-spacing: 6px; }
  .spread-grid { grid-template-columns: 1fr 1fr; }

  /* ── Screen 2: Deck ── */
  /* Stack vertically: compact top bar + scrollable card grid */
  #screen-deck {
    flex-direction: column;
  }

  /* Right panel becomes a compact horizontal bar at the top */
  #right-panel {
    width: 100%;
    min-width: unset;
    flex-direction: row;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    border-left: none;
    border-bottom: 1px solid #c8a84b;
    flex-shrink: 0;
    background: rgba(238,220,185,.85);
  }

  #change-btn {
    align-self: auto;
    padding: 7px 12px;
    font-size: 13px;
    order: -1;
  }

  #instruction {
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
  }

  #needed-count {
    font-size: 32px !important;
    display: inline !important;
  }

  #progress {
    font-size: 12px;
    flex-basis: 100%;
    min-height: unset;
  }

  #reveal-btn {
    width: 100%;
    padding: 10px;
    font-size: 14px;
  }

  /* Card grid fills remaining space and scrolls */
  #grid-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 10px;
    gap: 6px;
  }

  /* Slightly smaller cards on mobile */
  .card {
    width: 68px;
    height: 104px;
  }

  /* Results overlay — full scroll */
  #results-overlay {
    padding: 24px 14px 40px;
  }

  /* Spread grids: shrink columns for narrow screens */
  .spread-cross,
  .spread-h {
    grid-template-columns: repeat(3, 100px);
  }
  .spread-9 {
    grid-template-columns: repeat(3, 100px);
  }
  .result-card {
    width: 95px;
    height: 170px;
  }

  /* Cards browser */
  #cards-browser-grid {
    padding: 16px 12px 32px;
    gap: 10px;
  }

  /* Infinite bar — safe area bottom padding */
  #infinite-bar {
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
}
</style>

      { name: "雅克·拉康", era: "法国，20世纪", text: `镜像阶段（1949）揭示自我在对他者形象的误认（méconnaissance）中形成——我们认同的"我"本是一个外在的形象，自我从诞生起便是异化的他者。` },
      { name: "大卫·休谟", era: "苏格兰，18世纪", text: `在《人性论》中否认有统一、稳定的自我——"自我"不过是一束快速流逝的感知印象，没有持存的主体在感知的背后，自我是一种方便的叙事虚构。` },
      { name: "佛教（早期印度）", era: "古代印度", text: `"无我"（anattā）——自我是一个方便的概念构建，而非真实存在；执著于自我的不变性正是苦（dukkha）的根源，从固化的自我形象中解脱才是修行的方向。` }
    ]
  },
  11: {
    divination: `你是否在寻找发生这一切的"原因"，或者试图用逻辑说服自己或他人？因果关系比你想象的更脆弱，推理链条也可能悄悄断裂。此刻值得停下来问：你的前提是什么，你的推论是否真的成立？`,
    philosophers: [
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `四因说（质料因、形式因、动力因、目的因）——完整的因果解释需同时回答四个问题；《工具论》奠定形式逻辑，三段论是推理的基本形式：从普遍前提经有效推论达到必然结论，逻辑与因果在亚里士多德这里是理解世界的双重工具。` },
      { name: "大卫·休谟", era: "苏格兰，18世纪", text: `《人类理解研究》：因果不是客观必然联系，而是心灵的习惯性联想——我们只观察到时序相随，"力"的传递是想象的投射；归纳法没有逻辑基础（归纳问题），过去重复不能保证未来必然。` },
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `因果性是知性的先天范畴，使经验成为可能——不是经验给了我们因果，而是理性将因果框架投射到经验上；形式逻辑（同一律、矛盾律、排中律）是思维的先天形式，不依赖任何内容。` },
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `早期：逻辑是语言图像世界的骨架，重言式（tautologies）是逻辑真理，但什么都没说。晚期：逻辑推理是语言游戏中的规则，不同游戏有不同推理规范——"因果"在不同语境下意味着不同的事。` }
    ]
  },
  12: {
    divination: `你面前的这个情境，是否在更深处与你生命中另一个时刻有着相同的结构？找到深层的同构，就找到了理解当下的钥匙。`,
    philosophers: [
      { name: "柏拉图", era: "古希腊，公元前5-4世纪", text: `理念论——具体事物与永恒理念之间存在同构关系（分有/模仿），理解事物就是识别其与理念的结构对应；知识是对这种对应关系的认识，而非对个别事物的观察。` },
      { name: "克劳德·列维-斯特劳斯", era: "法国，20世纪", text: `结构人类学揭示不同文化的神话、亲属制度在表层差异下共享深层结构——文化现象的意义在于结构位置而非内容；不同事物可以是同一深层模式的不同实现。` },
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `早期《逻辑哲学论》提出图像论——命题与事态之间存在逻辑形式上的同构；语言图示世界的方式与世界的结构相对应，这种共同的逻辑形式是说话成为可能的条件。` }
    ]
  },
  13: {
    divination: `表面上看似分离的事物，在深层可能是相连的；看似对立的内外，也许只是同一连续面的不同部分。这张牌邀请你去发现那个隐藏的连续性。`,
    philosophers: [
      { name: "雅克·拉康", era: "法国，20世纪", text: `大量使用拓扑学图形（莫比乌斯带、环面、克莱因瓶、博洛米结）描述主体、他者、欲望与实在界的关系——这些图形的拓扑特性直接呈现了无意识结构，无法用简单的内/外二元来理解。` },
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `在《褶子》中，拓扑学的折叠与展开描述了实体如何在保持连续性的同时产生无限的差异——内部是外部的折叠，而非与外部对立；形变之中保有的不变量才是真正的本质。` }
    ]
  },
  14: {
    divination: `你是否一直活在头脑里，忘记了身体的知道，也忘记了构成你的那些元素？你的感知、你的肉身重量，是比语言更古老的知识来源。此刻，听听身体在说什么，也感受一下你是由什么"质料"构成的。`,
    philosophers: [
      { name: "莫里斯·梅洛-庞蒂", era: "法国，20世纪", text: `《可见与不可见》中的"肉质"（chair）不是物质，而是身体与世界共同编织的织物——我既是感知者也是被感知者，手摸手时感觉到的那个互逆性就是肉质的秘密；思想栖居于肉身之中，而非高悬于其上。` },
      { name: "恩培多克勒", era: "古希腊，公元前5世纪", text: `万物由火、水、土、气四元素（roots）在爱与争的力量下混合分离——一切具体事物都是元素的暂时组合，分离时元素归回本源；感知本身也是同类相知，我们以体内的火感受外在的火。` },
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `质料（hylē）是形式得以实现的基底——没有无质料的形式，也没有无形式的质料；灵魂是身体的形式，身体是灵魂的质料，两者构成不可分离的统一体；"元素"是可感世界存在的最终构成维度。` },
      { name: "埃德蒙德·胡塞尔", era: "德国，19-20世纪", text: `区分物理身体（Körper）与活的身体（Leib）——我的身体是与世界相遇的零点，一切感知都从这里展开；活的身体不是我拥有的对象，而是我就是的视角，是感知的元素性根基。` }
    ]
  },
  15: {
    divination: `你的处境不只是你个人的——你所在的场域、关系矩阵、深层结构，正在无形中规定着什么是可能的、什么是不可见的。此刻你感受到的限制，也许不来自你自身，而来自那个框定你的结构本身。识别它，才能在其中找到真正属于你的位置。`,
    philosophers: [
      { name: "皮埃尔·布迪厄", era: "法国，20世纪", text: `场域（champ）是各行动者争夺特定资本的结构性竞技场，惯习（habitus）是场域在身体上留下的印记——位置决定意义，场域决定可能性的边界，改变处境必须先改变场域中的位置。` },
      { name: "克劳德·列维-斯特劳斯", era: "法国，20世纪", text: `结构主义认为文化现象只有在关系矩阵（structure）中才有意义——表面上千差万别的神话、亲属制度背后隐藏着普遍的深层结构；元素本身没有固有意义，意义来自对立与差异的关系网络。` },
      { name: "路易·阿尔都塞", era: "法国，20世纪", text: `意识形态国家机器（ISA）将结构内化为个体的"自愿"认同——主体在被呼唤（interpellation）的瞬间，就已经在结构中占据了一个位置；我们以为是自由选择的，往往是结构的再生产。` },
      { name: "库尔特·勒温", era: "德国-美国，20世纪", text: `场论心理学：行为是人与心理场的函数 B=f(P,E)——不能脱离情境理解个体，改变行为需改变整个场域的力量格局，而非仅仅作用于单独的个体。` }
    ]
  },
  16: {
    divination: `你正在经历的也许是一个不寻常的时刻——规则在此处失效，既有的解释框架无法容纳它。不要用旧地图去走新路，这个奇点本身就是信号。`,
    philosophers: [
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `奇点（singularité）是不可归约为特殊或一般的事件节点，它既不服从类型（type）也不是个例（token）——奇点是生成（devenir）的临界点，规则在此破裂，新的秩序从这里涌出。` },
      { name: "阿兰·巴迪欧", era: "法国，20世纪", text: `《存在与事件》——事件是一种奇点，它无法被既有情势的计数（count-as-one）所包容，真理总是由对某个奇异事件的忠诚（fidélité）而产生，而非由信息积累获得。` },
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `物自体（Ding an sich）作为终极奇点，永远超出经验的可达范围——它是现象界背后那个无法被把握的绝对他者，标志着我们认识能力的根本边界。` }
    ]
  },
  17: {
    divination: `某件事正在发生——或者即将发生——它将打破旧的秩序。事件的意义不在发生时，而在你如何保持对它的忠诚中——你愿意被这个事件改变吗？`,
    philosophers: [
      { name: "阿兰·巴迪欧", era: "法国，20世纪", text: `事件（événement）是超出既有情势结构之外的突然涌现——它是不可计数的，强行闯入；真理由对事件的忠诚产生，而非由信息积累获得，事件要求主体作出选择。` },
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `《意义的逻辑》中事件是非物质的转化，是"纯粹的成为"（pure becoming），是语言所说的而非身体所做的——事件始终超过其实现，是不可穷尽的。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `"本有"（Ereignis，本源性事件）是存在与思想相互归属的基础事件——既非主体也非客体，而是两者共同所属的敞开；存在历史的每一个时代都由一个根本性"事件"开启。` }
    ]
  },
  18: {
    divination: `也许此刻你需要的不是行动，而是承受——真正的开放需要一种主动的被动：让他者的到来真正触动你，而不是将一切迅速纳入既有框架。`,
    philosophers: [
      { name: "艾玛纽尔·列维纳斯", era: "立陶宛-法国，20世纪", text: `《别于存在》中的被动性超越一切被动——伦理主体在任何主动回应之前已经被他者所打动和吁求，这种先于意识的暴露是责任的根源，我在被触动时才成为道德主体。` },
      { name: "莫里斯·布朗肖", era: "法国，20世纪", text: `写作是一种彻底的被动性——作家在写作中被作品所剥夺，被"中性之物"（le neutre）所占有，主动的创作主体在这里消失，最纯粹的表达发生在主动性让位之处。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `"泰然任之"（Gelassenheit，放任/放开）是一种对存在的开放性顺从——不是消极懒惰，而是放下控制意志，让存在自行显现；最深的智慧有时是停止强行推动。` }
    ]
  },
  19: {
    divination: `停下来，看看你自己正在看的方式。这张牌邀请你转向：不只是看外部世界，而是去观察那个正在观察的人。你的思维框架本身是否也需要审视？`,
    philosophers: [
      { name: "勒内·笛卡尔", era: "法国，17世纪", text: `"我思故我在"——在普遍怀疑的极限处，思维的行为本身反折回来，成为不可怀疑的确定性基础：思维确认了思维者的存在，自我意识是现代哲学的起点。` },
      { name: "约翰·费希特", era: "德国，18-19世纪", text: `自我通过绝对的自我设定（Selbstsetzung）而存在——"我"在自我指涉的行动中确立自身，自我意识是一切知识的无条件基础；没有反身，就没有知识的可能。` },
      { name: "黑格尔", era: "德国，18-19世纪", text: `反思（Reflexion）不仅是思想的回折，更是精神在遭遇他者后返回自身的运动——反思是精神辩证运动的内在机制，真正的自知需要经过他者的中介。` },
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `理性必须对自身的能力和限度进行批判性考察——不先审问你的认识工具，就无法真正认识世界；批判是理性的反身性自我检验，是思想成熟的标志。` }
    ]
  },
  20: {
    divination: `你是否感到一切努力都石沉大海？这张牌不是让你放弃，而是邀请你重新审视意义的来源：当结果注定无法完美或持久时，行动本身是否仍有其内在的尊严？`,
    philosophers: [
      { name: "阿尔贝·加缪", era: "法国，20世纪", text: `《西西弗神话》中西西弗象征人类处境——他无止境地将石头推上山只为再次滚落，但"我们必须想象西西弗是幸福的"；在荒诞中不逃避地接受徒劳，本身即是最高形式的反抗。` },
      { name: "阿图尔·叔本华", era: "德国，19世纪", text: `意志是盲目的、永不满足的力量——一切欲求满足之后只产生新的欲求，只有在审美沉思中才能短暂脱离意志的徒劳驱动；存在本质上是一场永不赢得的游戏。` },
      { name: "塞缪尔·贝克特", era: "爱尔兰，20世纪", text: `《等待戈多》以"我不能继续，我要继续"道尽人类处境——徒劳是人类存在的基本质地，而非需要解决的问题；继续本身即是对徒劳的回答。` }
    ]
  },
  21: {
    divination: `这件事以前是否发生过？它会再次发生吗？如果这一刻将以完全相同的方式无限重复，你是否愿意？这是对你生命方式的终极试炼。`,
    philosophers: [
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `《查拉图斯特拉如是说》中的"永恒轮回"是最沉重的思想——如果一切将无限重演，你能肯定自己的每一个瞬间吗？这是对生命最彻底的肯定或否定的试金石。` },
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `《差异与重复》重新诠释永恒轮回——回来的不是同一（the same），而是差异本身：每次重复都产生差异，轮回是差异的无限生成，而非单调的复原。` },
      { name: "佛教/印度教（古代印度）", era: "古代印度", text: `轮回（Samsara）是生死流转的循环，业力（karma）贯穿其中——痛苦的源头在于对轮回的执取，解脱在于从循环中觉醒；重复之苦是觉悟的第一推动力。` }
    ]
  },
  22: {
    divination: `你与某人或某物的关系，比你以为的更加深刻地编织在一起。承认依赖有时不是软弱，而是对关系真实本质的诚实承认——边界并不总是需要被维持的。`,
    philosophers: [
      { name: "黑格尔", era: "德国，18-19世纪", text: `主奴辩证法——主人依赖奴隶的承认，奴隶依赖主人的权威，在相互依赖与承认的结构中彼此规定；独立意识恰恰依赖于它试图否定的那个依赖意识，自足是一个幻觉。` },
      { name: "莫里斯·梅洛-庞蒂", era: "法国，20世纪", text: `身体间性（intercorporeality）——身体与他者的身体是交织在一起的，感知从根本上就是与世界和他者的共在；孤立的个体只是一个抽象，真实的存在是共在的。` },
      { name: "佛教（古代印度）", era: "古代印度", text: `缘起（pratītyasamutpāda）——"此有故彼有，此生故彼生"，一切现象皆在相互依存中生起；没有任何事物能独立自存，共生是存在的基本事实而非例外。` }
    ]
  },
  23: {
    divination: `你现在看到的，也许不是正在发生的，而是早已发生却迟迟才抵达的。意义从不在事件本身的瞬间闪现，它需要时间、需要距离、需要一次回望——才能在延迟中浮现出真正的轮廓。此刻你对过去的理解，也正从当下的眼光中被重写；而你以为已经抵达的答案，可能只是另一次等待的开始。`,
    philosophers: [
      { name: "西格蒙德·弗洛伊德", era: "奥地利，19-20世纪", text: `"延后作用"（Nachträglichkeit）——早期经历在后来的语境中被重新赋予意义，创伤不在最初发生时，而在后来被重新铭刻时才真正形成；意义的抵达总是延迟的，过去在我们重访它时才被改写。` },
      { name: "雅克·拉康", era: "法国，20世纪", text: `回溯性（rétroaction）——能指链的意义只有在后续的"扣眼"（point de capiton）处才能被锁定，意义永远是向前说出、向后固定的；延迟不是缺陷，而是意义得以生成的结构性条件。` },
      { name: "亨利·柏格森", era: "法国，19-20世纪", text: `绵延（durée）中的延迟——时间不是均质的空间刻度，而是意识的流动与积累；真实的时间体验总是"稍晚于"即时反应，感知、记忆与理解之间存在不可消除的延迟，正是这个延迟构成了我们真正活过的时间。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `重演（Wiederholung）——本真的存在意味着从过去的可能性中将其检索出来；回溯与延迟共同构成此在的时间性：我们总是在"已曾在"（Gewesenheit）与"将来"之间的张力中，姗姗理解自身的处境。` }
    ]
  },
  24: {
    divination: `你是感到空洞，还是被太多填满？缺失与过剩从不对立——匮乏驱动欲望向前，过剩将欲望淹没，两者都让你无法真正停下来。这张牌提醒你：不够与太多都是同一种焦虑的两张面孔。此刻真正缺少的，也许不是你以为的那个东西。`,
    philosophers: [
      { name: "雅克·拉康", era: "法国，20世纪", text: `"存在的欠缺"（manque-à-être）是欲望的结构基础；而"享乐"（jouissance）则是欲望的过剩面——超过快乐原则的享受，带来的不是满足而是痛苦的愉悦。缺失与过剩在拉康体系中是一枚硬币的两面：欲望永远在两者之间震荡，而不抵达。` },
      { name: "乔治·巴塔耶", era: "法国，20世纪", text: `《被诅咒的部分》提出"普遍经济学"：宇宙的根本问题不是稀缺，而是过剩——生命系统总是产出超过消耗所需的能量，这个剩余必须被耗费（通过献祭、节日、战争或艺术），否则将以灾难性方式爆发。过剩是存在的基底，而非缺失。` },
      { name: "黑格尔", era: "德国，18-19世纪", text: `意识总是超出自身，被内在的不满足推动——欠缺不是需要消除的问题，而是精神自我超越的引擎。但这个运动同时也产生过剩：每一次扬弃（Aufhebung）都保留了被超越的东西，历史是欠缺与积累交替叠加的过程。` },
      { name: "柏拉图", era: "古希腊，公元前5-4世纪", text: `《会饮篇》中爱若斯（Eros）是匮乏（Penia）与富足（Poros）之子——爱欲从匮乏处出发，却在富足中迷失方向；哲学的追求正是在这两极之间寻找那条不断逃离的中间路径。` }
    ]
  },
  25: {
    divination: `你正在失去某样东西——或者即将需要放弃某样东西。这张牌问：你愿意为什么而献祭？失去的背面，是什么在等待被获得？`,
    philosophers: [
      { name: "乔治·巴塔耶", era: "法国，20世纪", text: `献祭将物品从有用的世界（profane）归还给亲密性的领域（sacred）——它通过破坏事物的实用性而恢复物与人之间最初的内在连接；献祭是对经济原则的根本超越，是纯粹的耗费。` },
      { name: "勒内·基拉尔", era: "法国，20世纪", text: `《暴力与神圣》揭示替罪羊机制——群体通过将暴力集中于一个替代性牺牲品来净化内部冲突，神圣与暴力在根源上是同一的；替罪羊的献祭创造了共同体的团结。` },
      { name: "黑格尔", era: "德国，18-19世纪", text: `主人为证明自身自由而冒着死亡的风险（献祭了安全感），这一对生命的赌注构成了被承认的最初条件——献祭是自我意识诞生的代价，也是精神超越自然性的门槛。` }
    ]
  },
  26: {
    divination: `你正在触碰某个边界——个人的、认知的、或伦理的。极限的形状定义了你内部可能性的轮廓——了解你的边界，并不总意味着接受它，有时意味着更清晰地看见它。`,
    philosophers: [
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `纯粹理性的界限——我们只能认识现象（appearances），永远无法企及物自体（noumena）；理性的极限不是失败，而是人类知识形式的结构性边界，承认它是诚实思考的起点。` },
      { name: "乔治·巴塔耶", era: "法国，20世纪", text: `逾越（transgression）与限制相互构成——没有禁忌就没有逾越，但逾越本身肯定了它所超越的限制；圣洁与淫秽、经济性与耗费（dépense）在极限处相遇，限制创造了意义的强度。` },
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `"凡可说的，皆能说清楚；凡不可言说的，必须沉默"——语言的边界就是世界的边界，无法言说之物才是最重要的；极限不是终点，而是向另一个维度的开口。` }
    ]
  },
  27: {
    divination: `你是否一直在寻找那个支撑一切的中心，或者事物背后那个不变的本质？也许中心从未真正在场，本质也并非等待被发现的固定之物。此刻值得停下来追问：你认为"本质如此"的那些判断，是照见了真实，还是投射了幻象？`,
    philosophers: [
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `"本质"（ousia，实体/本质）是哲学的首要问题——事物之所是（to ti ên einai）构成其本质，是使它成为它自身而非他物的内在规定；本质不在感官之外，而就内在于具体事物的形式之中。` },
      { name: "雅克·德里达", era: "法国，20世纪", text: `《结构、符号与游戏》——每个结构都假设一个中心，但这个中心既不属于结构之内也不属于其外；中心是一个矛盾的原则，它的缺席允许了无限的游戏替补，"本质"同样是一种稳定化的幻象，用以压制意义的无限播撒。` },
      { name: "柏拉图", era: "古希腊，公元前5-4世纪", text: `理念（eidos）是万物的真正本质与中心来源——可感事物因分有理念而存在，善的理念是一切本质中的本质；但这个"中心"高悬于感官世界之外，永远无法被直接触及，只能被灵魂朝向。` },
      { name: "让-保罗·萨特", era: "法国，20世纪", text: `"存在先于本质"——人没有预先给定的本质，人是自我创造的存在；拒绝任何固定的"中心"或"本质"对人的规定，正是人之自由与责任的根基。` }
    ]
  },
  28: {
    divination: `你是否感到两个都是真实的、却又互相排斥的？悖论不一定需要解决，有时候它的张力本身就是真相的住所——让矛盾存在，观察它。`,
    philosophers: [
      { name: "芝诺", era: "古希腊，公元前5世纪", text: `阿基里斯追龟悖论——无限分割的空间中，运动似乎变得不可能；悖论不是文字游戏，而是揭示了感知世界与逻辑世界之间的真实裂缝，迫使我们重新审视关于连续与无限的假设。` },
      { name: "伯特兰·罗素", era: "英国，19-20世纪", text: `罗素悖论（不包含自身的集合之集合）——自我指涉带来的矛盾动摇了朴素集合论的基础，迫使整个数学逻辑进行根本性重建；悖论是思想触及自身边界的地方。` },
      { name: "老子", era: "中国，约公元前6世纪", text: `道以悖论说话——"曲则全，枉则直""知者不博，博者不知"；最深的真理只能以自相矛盾的方式被表达，因为它超出了线性逻辑所能容纳的范围。` },
      { name: "庄子", era: "中国，约公元前4世纪", text: `"道隐于小成，言隐于荣华"——知识在触及极限时溶解为悖论；从蝴蝶梦到庄周梦蝶，从"无我""无物"的深渊，真知超越了言说与论证所能把握的。` }
    ]
  },
  29: {
    divination: `某个阶段即将结束，某个旧有的形式正在消亡——这张牌不是凶兆，而是邀请：直视这个终结，让它帮你看清什么才是真正重要的。`,
    philosophers: [
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `"向死而生"（Sein-zum-Tode）——死亡是此在最本己的、不可逃避的可能性，真诚地面对死亡的有限性才能使此在从沉沦中醒来，做本真的自己；只有有限者才能真正在场。` },
      { name: "伊壁鸠鲁", era: "古希腊，公元前4-3世纪", text: `"死亡对我们来说什么都不是——当死亡在场，我不在；当我在，死亡不在场"——对死亡的恐惧是非理性的，因为死亡永远不是我们的经验，而是经验的终止。` },
      { name: "艾玛纽尔·列维纳斯", era: "立陶宛-法国，20世纪", text: `死亡是绝对他者性（alterity）的体验——他者面孔中总携带着死亡的痕迹，这是伦理责任最原初的召唤；你对他者的责任，比你自己的死亡更紧迫。` },
      { name: "庄子", era: "中国，约公元前4世纪", text: `庄子妻死鼓盆而歌——死亡是气的聚散，是形态的转化而非终结；以道观之，生死不过是昼夜交替，对死亡的执著才是最大的误解。` }
    ]
  },
  30: {
    divination: `你现在面对的也许不仅是个人选择，而是一个伦理-政治的情境——你的行动嵌入在关系网络与权力结构里，它会塑造你所在的共同体，也会塑造你自己。`,
    philosophers: [
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `伦理学是关于幸福（eudaimonia）的学问，政治学是伦理学的延伸——人天然是政治动物（zōon politikon），美德在城邦（polis）生活中才得以实现；道德不能脱离共同体而存在。` },
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `绝对命令——"只按照你同时可以意愿其成为普遍法则的准则行动"；道德义务是理性的自我立法，不依赖于后果或情感，人永远是目的而非手段。` },
      { name: "孔子", era: "中国，公元前6-5世纪", text: `仁义礼智信构成伦理实践的核心——道德不是抽象原则，而是在具体的君臣、父子、夫妻关系中被培育的德性；政治以正名开始，名不正则言不顺，言不顺则事不成。` },
      { name: "米歇尔·福柯", era: "法国，20世纪", text: `伦理是"自我的关怀"（souci de soi）——权力关系渗透一切伦理实践，真正的伦理问题是：我们如何构建自己的主体性，以抵抗规范化权力对我们的塑造？` }
    ]
  },
  31: {
    divination: `你现在的体验是什么样的时间感？急迫、拖延、凝固还是流动？你与时间的关系揭示了你与存在的关系——注意你身体里的时间感受。`,
    philosophers: [
      { name: "亨利·柏格森", era: "法国，19-20世纪", text: `"绵延"（durée）是真实的时间——不是可分割的空间化时间，而是连续的、质性的意识之流，过去与现在互相渗透而非并排；把时间想象成空间中的点，就已经错过了时间的本质。` },
      { name: "埃德蒙德·胡塞尔", era: "德国，19-20世纪", text: `时间意识分析——活的当下包含着对刚刚过去（retention）和即将到来（protention）的指向；意识是时间的构成性来源，而非在时间之中的一个点。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `时间性是此在的存在结构——"绽出的时间性"（ekstatische Zeitlichkeit）将曾在（past）、将来（future）、当下（present）统一为一个整体，将来具有优先性：我们是向死而生的存在，未来不断拉着我们向前。` },
      { name: "奥古斯丁", era: "北非/罗马，4-5世纪", text: `"那么时间是什么？没有人问我，我知道；有人问我，我就不知道了"——时间在心灵中存在：过去是记忆，现在是直觉，未来是期望；时间是心灵的伸展。` }
    ]
  },
  32: {
    divination: `某种断裂已经发生，或正在发生——不是普通的困难，而是那种让语言失效、让理解停摆的根本性震荡。布朗肖说：灾异之后，写作仍然开始。不是因为有什么可说，而是因为沉默也是一种书写。此刻，不必急于"理解"它。`,
    philosophers: [
      { name: "莫里斯·布朗肖", era: "法国，20世纪", text: `《灾异的书写》——灾异（désastre）是彻底的断裂，它夺去了星辰（dés-astre），使人无法再依靠任何定位系统；灾异不能被经验或记忆，它来到之前已经过去；正是因为无法言说，写作才必须开始，在沉默的边缘书写。` },
      { name: "保罗·策兰", era: "罗马尼亚-法国，20世纪", text: `大屠杀之后的诗歌——语言已经被污染和摧毁，但诗歌必须在被摧毁的语言中继续；《死亡赋格》用语言的扭曲来承载不可承载之物；灾异不能被再现，只能被语言的断裂所指示。` },
      { name: "西奥多·阿多诺", era: "德国，20世纪", text: `"奥斯维辛之后写诗是野蛮的"——不是禁止写作，而是断言文化在灾异面前的根本性破产；受苦需要艺术作为其代言，但美化苦难是对它的背叛；负辩证法是在灾异之后思考的唯一诚实方式。` },
      { name: "让-弗朗索瓦·利奥塔", era: "法国，20世纪", text: `崇高（sublime）是无法被表现之物留下的痕迹——灾异在崇高的维度上运作，它超出一切再现框架；见证灾异的义务是后现代伦理的核心，它意味着承认有些东西永远超出话语的掌握。` }
    ]
  },
  33: {
    divination: `你是否在寻找某种更大的意义或依托——某个超越个人的维度？无论你称它为神、道、空还是别的什么，那个超越你所能把握之物，始终以其缺席方式在场。`,
    philosophers: [
      { name: "托马斯·阿奎那", era: "意大利，13世纪", text: `上帝是纯粹现实性（actus purus），是一切存在的源头，自身不被任何潜能限制——五个论证从运动、因果、可能性到完美性与目的性，都指向同一个第一原理；神性是存在本身（ipsum esse subsistens）。` },
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `"上帝死了！"——不是无神论宣言，而是虚无主义危机的诊断：曾赋予一切意义的超越性基础已经崩塌，现代人面对彻底的价值重估；这既是危机也是创造的机会。` },
      { name: "龙树", era: "古印度，2-3世纪", text: `空性（Śūnyatā）——一切现象皆无自性，空性本身也是空的（空空）；这不是虚无主义，而是万物相互依存、无固定本质的真相；神与空在此意义上都指向不可把握的绝对。` },
      { name: "埃克哈特大师", era: "德国，13-14世纪", text: `神性（Gottheit）超越上帝（Gott）——神性是无深渊（Abgrund），是超越一切属性的纯粹否定性虚空，灵魂在其最深处与此虚无相遇，在彻底的脱落（Abgeschiedenheit）中与神性合一。` }
    ]
  },
  34: {
    divination: `此刻显现出来的，仅仅是表面。在这个显现之中，还有什么被折叠、被隐藏着？去折叠那个隐藏，而不是加速展开更多的表面。`,
    philosophers: [
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `《褶子：莱布尼茨与巴洛克》——折叠是世界的基本操作，一切都是折叠与展开的运动，内部是外部的折叠而非与外部对立；巴洛克艺术是折叠无限增殖的风格，每个褶皱都包含着整个世界。` },
      { name: "戈特弗里德·莱布尼茨", era: "德国，17-18世纪", text: `单子（monad）没有窗户，却在自身内部折叠着整个宇宙的表象——每个单子从自身独特的视角展开宇宙，内部与外部的关系是折叠而非开口，世界以折叠的方式存在于每个存在者之中。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `真理（aletheia）是去遮蔽（unconcealment）——但遮蔽与隐藏始终是去蔽的基础和残余，无遮蔽的真理总是在遮蔽之中显现；存在在显现的同时也在隐退，这是存在历史的基本节律。` }
    ]
  },
  35: {
    divination: `也许你正在经历某种边界被侵入的感觉——某个"纯粹"的东西被什么混入了。纯粹本来就是一个幻觉，接受混染或许恰恰打开了新的可能。`,
    philosophers: [
      { name: "雅克·德里达", era: "法国，20世纪", text: `污染是一般条件——每个纯粹的概念都已经被其对立面所侵染，界定一个概念的尝试始终包含着它试图排除的东西；差异从内部污染同一，纯粹只是一个被压制了差异的权力效果。` },
      { name: "朱莉亚·克里斯蒂娃", era: "保加利亚-法国，20世纪", text: `《恐惧的力量》中的"卑贱"（abject）——被排出以构成主体的那些东西始终威胁着回归，主体边界的维持是永无止境的对污染的抵御；我们最深的恐惧来自那些我们最努力排除的东西。` },
      { name: "玛丽·道格拉斯", era: "英国，20世纪", text: `《洁净与危险》——污染是"错位之物"（matter out of place），纯洁与污染的区分是社会秩序的投射，没有本质上的污秽；所谓"污染"揭示的是秩序的边界，而非事物的本性。` }
    ]
  },
  36: {
    divination: `此刻你经历的这件事，对你意味着什么？意义不是被发现的，而是在诠释与给予的过程中被创造的——你愿意赋予它什么，它就携带着什么。`,
    philosophers: [
      { name: "戈特洛布·弗雷格", era: "德国，19-20世纪", text: `意义（Sinn）与指称（Bedeutung）的区分——"晨星"与"昏星"指向同一天体（相同的指称），但意义不同；意义是我们理解世界的方式，而非世界本身，两个意义不同的表达可以指称同一个对象。` },
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `晚期《哲学研究》中"意义即用法"（Bedeutung ist Gebrauch）——词语的意义在于它在特定生活形式中的实际使用，意义不是固定的，而是在使用中生成和变化的。` },
      { name: "保罗·利科尔", era: "法国，20世纪", text: `诠释学冲突——意义是多元的，需要在"说明"（explication）与"理解"（compréhension）的辩证中被把握；叙事给予时间以意义，讲故事是人类给生命赋予意义的基本方式。` },
      { name: "埃德蒙德·胡塞尔", era: "德国，19-20世纪", text: `意向性——意识总是关于某事的意识，意义是主体-客体相关性的结构；意义不是主观投射也不是客观属性，而是意向行为的构成成果，是我们与世界相遇的方式本身。` }
    ]
  },
  37: {
    divination: `你向往什么？被什么吸引，即使无法完全解释原因？爱欲与美都是指向某种超出当下的东西——柏拉图说，美是唯一能在尘世中闪光的理念。此刻，那个让你心动的方向，也许正是值得追随的方向。`,
    philosophers: [
      { name: "柏拉图", era: "古希腊，公元前5-4世纪", text: `《会饮篇》中的爱欲阶梯（Diotima之路）——从爱一个美丽的身体，到爱所有美丽的身体，到爱美丽的灵魂，到爱美的知识，最终直观美本身；爱欲（Eros）是灵魂对不朽的向往，美是通往善的阶梯。` },
      { name: "西格蒙德·弗洛伊德", era: "奥地利，19-20世纪", text: `爱欲（Eros）与死亡驱力（Thanatos）是生命的两极张力——力比多（libido）是爱欲的能量，可投注于对象、升华为文化创造；美的体验是力比多向外流动时遇见契合之物的瞬间。` },
      { name: "弗里德里希·席勒", era: "德国，18世纪", text: `《美育书简》——美是感性与理性的和谐统一状态，审美教育是通向自由的道路；只有通过美，我们才能从感性冲动与理性强制的双重束缚中解放出来，进入真正自由的游戏状态。` },
      { name: "吉尔·德勒兹 & 费利克斯·瓜塔里", era: "法国，20世纪", text: `欲望是生产性的流，不是缺失的标志；艺术（包括美的经验）是感知与感情的块（blocs de percepts et d'affects），它捕获和释放强度，让爱欲的流动找到新的形态和方向。` }
    ]
  },
  38: {
    divination: `你是从什么角度看待这个情境的？换一个视点，整个图像就会不同。没有"客观中立"的视点——但也正因如此，你拥有选择视点的自由。`,
    philosophers: [
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `视点主义（Perspectivism）——"没有事实，只有诠释"；一切知识都是视角性的，没有任何"上帝视角"，但这不是相对主义，而是要求积累更多视点、在视角的丰富中逼近真实。` },
      { name: "戈特弗里德·莱布尼茨", era: "德国，17-18世纪", text: `每个单子是宇宙的一面活镜子，从其独特的视角展现整个宇宙——每个存在都拥有独特的、不可被完全共享的视点；整个宇宙被从无数个角度同时展现，每个角度都是真实的。` },
      { name: "托马斯·库恩", era: "美国，20世纪", text: `《科学革命的结构》——不同科学范式是不可通约的（incommensurable）视点框架，革命不是积累而是视点的整体转换；范式之间没有中立的翻译，选择范式就是选择看世界的方式。` }
    ]
  },
  39: {
    divination: `你正凝视着一个超出你所能把握的无限——也许是某种关系的可能性，也许是生命意义的问题。这张牌不给你终点，它邀请你在无限面前保持谦卑与开放。`,
    philosophers: [
      { name: "格奥尔格·康托尔", era: "德国，19-20世纪", text: `集合论中的实无限——无限集合之间也有大小之别（ℵ₀, ℵ₁…），无限并非单一；无穷集合的数学彻底改变了无限观念，无限不再是令人眩晕的深渊，而是有结构的数学对象。` },
      { name: "巴鲁赫·斯宾诺莎", era: "荷兰，17世纪", text: `上帝即自然（Deus sive Natura）是唯一的无限实体，拥有无限数量的属性，其中我们只认识两种（思想与广延）——无限是存在最根本的维度，有限者只是无限的有限样态（modus）。` },
      { name: "艾玛纽尔·列维纳斯", era: "立陶宛-法国，20世纪", text: `《总体性与无限》——无限总是超出任何试图将其总体化的努力；他者的面孔就是无限的踪迹，伦理是与无限的关系，不是被掌握的无限，而是让我的全能裂开的无限。` },
      { name: "庄子", era: "中国，约公元前4世纪", text: `"大知闲闲，小知间间"——真正的大知是对自身认识界限的坦然承认，井底之蛙不知大海，因为有限与无限之间的差距本就是无限的；承认自己的有限，才是触碰无限的第一步。` }
    ]
  },
  40: {
    divination: `你是在观察，还是被观察？在这个情境中，你是主体还是客体——还是你同时是两者？认识者与被认识者之间的裂缝，也许正是理解的入口。`,
    philosophers: [
      { name: "勒内·笛卡尔", era: "法国，17世纪", text: `现代主客分裂的起点——思维实体（res cogitans）与广延实体（res extensa）的分割，确立了主体与客观世界的根本对立；这道裂缝开启了知识论的核心问题：我如何认识一个与我本质上不同的世界？` },
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `主体用直观形式和知性范畴构建认识客体——"物自体"永远处于主体的认识框架之外，主客之隔是认识的先天条件，我们认识的永远是被我们构建过的世界，而非世界本身。` },
      { name: "埃德蒙德·胡塞尔", era: "德国，19-20世纪", text: `现象学的"意向性"结构——意识总是朝向某个对象的意识，主客相关性（correlation）是先于分裂存在的基础结构；不能把其中一方还原为另一方，真实在主客的相遇中显现。` },
      { name: "黑格尔", era: "德国，18-19世纪", text: `主客的分裂是精神自我异化的产物，绝对知识是精神认识到客体就是异化了的主体时达到的——主客之隔在更高层次上被扬弃（aufgehoben），不是消除，而是被保留并超越。` }
    ]
  },
  41: {
    divination: `什么尚未发生，但完全可以发生？你此刻最真实的财富是那些尚未实现的可能性——你选择忠于哪个可能性，就向着哪种存在生长。`,
    philosophers: [
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `潜能（dynamis）与现实（energeia）的区分——事物不仅是其所是，更是其可能成为的；可能性不是虚假的，而是存在的基本模态，橡树子的潜能是橡树，人的潜能是德性的实现。` },
      { name: "戈特弗里德·莱布尼茨", era: "德国，17-18世纪", text: `可能世界（possible worlds）——上帝从无限可能的世界中选择了最好的这一个；样态性（modality）是形而上学的核心问题，区分必然真理与偶然真理是理解现实与可能的关键。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `此在是它的可能性——存在先于本质，此在首先是它所可能成为的，而非它所现实是的；向可能性投射（Entwurf）是此在最本己的存在方式，自由就是对可能性的担当。` },
      { name: "索尔·克里普克", era: "美国，20世纪", text: `《命名与必然性》的可能世界语义学——必然真理在所有可能世界中为真，偶然真理仅在某些可能世界为真；这一框架彻底改变了关于本质与偶然的讨论，可能性有其严格的逻辑结构。` }
    ]
  },
  42: {
    divination: `你是否正在试图找到"这一切是从哪里开始的"？每一个起源都已经是对更早起源的遮蔽。不要执著于找到那个绝对的开始，而是关注眼前的涌现。`,
    philosophers: [
      { name: "阿那克西曼德", era: "古希腊，公元前6世纪", text: `万物的本原（arché）是"无限者"（apeiron）——一个无定形的、无限的物质，一切确定之物都从中涌现，最终又归于其中；起源本身是不确定的，真正的开始是一个永无结束的过程。` },
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `第一哲学（形而上学）寻求存在之所以为存在的第一原理（archai）——四因说是寻找根本性起源的不同维度；对起源的寻找推动了整个西方哲学的发展。` },
      { name: "雅克·德里达", era: "法国，20世纪", text: `"原初踪迹"（archi-trace）——没有绝对的起源，每一个起源都已经是对先行者的踪迹；起源不是在场的开始，而是已经是延异（différance），每一个"第一次"都已经是重复。` },
      { name: "老子", era: "中国，约公元前6世纪", text: `道作为一切存在的起源，却"先天地生"而又"无以名之"——真正的起源无法被命名和固定，命名的瞬间起源已经隐退；道不是起源的内容，而是起源这一运动本身。` }
    ]
  },
  43: {
    divination: `你感到有什么在压制你，或者内心有一股想要冲破现状的力量？抵抗不一定是激烈的对抗，它可以是一条细微的裂缝、一个逃逸的方向。但这张牌同时也在问：裂缝打开之后，你想在那里建造什么？抵抗是起点，改革是方向——你准备好从"说不"走向"重新构建"了吗？`,
    philosophers: [
      { name: "米歇尔·福柯", era: "法国，20世纪", text: `"权力存在之处，抵抗也已在场"——抵抗不在权力之外，而是权力关系的共同构成要素；真正的改革也不是消灭权力，而是重新配置权力关系，创造新的主体性空间。` },
      { name: "安东尼奥·葛兰西", era: "意大利，20世纪", text: `反霸权（counter-hegemony）与"阵地战"——改革不是一蹴而就的夺权，而是在市民社会中缓慢建立文化与制度的抗衡力量；抵抗是打破旧秩序，改革是在废墟上重建新的共识。` },
      { name: "弗朗茨·法农", era: "马提尼克-阿尔及利亚，20世纪", text: `《大地上的受苦者》——反殖民抵抗是被压迫者重构自身主体性的过程；真正的改革不只是制度的更替，而是被剥夺了声音的人重新成为历史主角的实践，是自我再生而非单纯的翻转。` },
      { name: "约翰·罗尔斯", era: "美国，20世纪", text: `《正义论》——制度改革应以"无知之幕"后的理性选择为依据：若不知自己将身处社会哪个位置，我们会选择怎样的规则？改革的正当性在于对最不利者的优先照顾，抵抗不公正的同时，必须回答"什么是更公正的替代方案"。` },
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `逃逸线（lignes de fuite）——抵抗的方式不是正面硬碰，而是创造性地逃逸出既有编码，在秩序的缝隙中涌现新的生成；改革是把逃逸线变成新的地图，在流动中建立另一种可能的秩序。` }
    ]
  },
  44: {
    divination: `此刻也许你不需要更多言语——沉默本身就携带着一种信息。在那个无法言说的地方，停下来。让沉默说话。`,
    philosophers: [
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `《逻辑哲学论》末句"凡不可言说之事，必须保持沉默"——沉默不是失语，而是对语言界限的尊重；最重要的东西恰恰在可言说之外，伦理、美学与神秘就在这个沉默中。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `沉默学（Sigetik）——存在本身在"基础性奠基"中通过沉默说话，真正的思与言总在保持对言说不及之处的静默守护；最深刻的思想有时是对沉默的守护，而非对语言的填充。` },
      { name: "老子/庄子", era: "中国，约公元前6-4世纪", text: `"知者不言，言者不知"；"道可道，非常道"——最高的真理是无言的，语言所能覆盖的永远只是大道的表层；圣人以不言之教行于世，无声之处有最深的传达。` },
      { name: "约翰·凯奇", era: "美国，20世纪", text: `《4分33秒》（1952）——沉默不是声音的缺席，而是对所有声音的开放；去除意图后，周遭的一切声音本身就是音乐；沉默是一种聆听的姿势，而非表达的放弃。` }
    ]
  },
  45: {
    divination: `你是否担心遗忘某些重要的东西？或者你是否一直被某段无法忘记的记忆所困？遗忘不只是失去，有时也是生命自我更新的方式——遗忘是让生命得以继续的力量。`,
    philosophers: [
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `《历史对于生命的利与弊》——主动的遗忘是健康的、必要的力量；太多历史会压垮生命，真正能行动的人必须能够遗忘，在遗忘中为当下的新可能腾出空间；遗忘是创造的条件。` },
      { name: "柏拉图", era: "古希腊，公元前5-4世纪", text: `回忆说（anamnesis）——灵魂在出生前认识过所有的理念，而学习就是"回忆"那些在出生时被遗忘的知识；遗忘是灵魂降生的代价，而哲学就是克服这种遗忘的努力。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `遗忘（Vergessenheit）是沉沦状态的时间性——此在在沉沦中遗忘了自身的本真可能性；但存在本身也在历史中隐退与遗忘，这是形而上学历史的命运，也是思想需要克服的最深的遗忘。` },
      { name: "亨利·柏格森", era: "法国，19-20世纪", text: `遗忘与记忆相辅相成——记忆的生命力来自于能够在当下行动，遗忘是让记忆不压垮当下、使生命行动成为可能的必要机制；没有遗忘能力的生命将无法生活在当下。` }
    ]
  },
  46: {
    divination: `总有某样东西超出了你的掌握——超出了你的理解框架、超出了你对自己的期待。不是让你掌控那个超越，而是让自己在超越面前保持敞开。`,
    philosophers: [
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `"先验的"（transcendental）是经验的条件，"超验的"（transcendent）是超出经验界限的——理性自然地渴望超越，但这种渴望也是理性产生二律背反与幻象的根源；超越是理性永远的诱惑与陷阱。` },
      { name: "艾玛纽尔·列维纳斯", era: "立陶宛-法国，20世纪", text: `他者的无限性（Transcendance）——他者的面孔超越一切我能把握、整合、总体化的努力；伦理就是与这个根本超越的遭遇，不是被掌握的无限，而是让我的全能裂开的无限他者。` },
      { name: "卡尔·雅斯贝尔斯", era: "德国，20世纪", text: `"超越者"（das Umgreifende，所涵括者）——存在中始终有一个无法被客观化的向度，人在极限处境（Grenzsituationen：死亡、苦难、斗争、罪疚）中与超越者相遇，不是通过理论，而是通过存在的实践。` },
      { name: "佛教（古代印度）", era: "古代印度", text: `涅槃（Nirvana）是超越有条件存在（conditioned existence）的状态——不是虚无，而是超出生死轮回之外的彻底解脱；超越是从苦的循环中醒来，不是逃往别处，而是从根本上不再被执取所绑缚。` }
    ]
  },
  47: {
    divination: `你现在思考的方式本身，是否也需要被思考？退出你正在使用的框架，去看这个框架本身——元层次的思考往往是所有其他思考中最被忽视、却最重要的。`,
    philosophers: [
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `《范畴篇》——将"存在之所以为存在"（being qua being）提升为形而上学的主题，最高范畴是用于思考其他一切的那些概念；是概念的概念，是反思思维形式本身的尝试。` },
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `纯粹知性的概念（Kategorien）是应用于一切经验的元层次结构——不是从经验中得来，而是使经验成为可能的先验框架；批判哲学是对认识工具本身的元认识，是思想检验自身的尝试。` },
      { name: "库尔特·哥德尔", era: "奥地利-美国，20世纪", text: `不完备性定理——元数学陈述无法在其所描述的系统内被证明；关于系统的语言（元语言）与系统内的语言（对象语言）必须区分；任何足够强大的元概念框架都包含超出自身的真理。` },
      { name: "阿尔弗雷德·诺思·怀特海", era: "英国，19-20世纪", text: `《过程与实在》的思辨哲学——寻求最普遍的元概念框架来描述一切存在，"过程""实现""创造力"等元概念本身构成了哲学反思的最终目标；哲学是对最基本概念的永续反思。` }
    ]
  },
  48: {
    divination: `当你感到失控、混乱、无法理解时——也许那不只是你的"问题"。有时"正常"世界的疯狂比你内心的混乱更值得质疑。你所称作"疯狂"的，究竟是谁的定义？`,
    philosophers: [
      { name: "米歇尔·福柯", era: "法国，20世纪", text: `《疯癫与文明》——大禁闭（Grand Renfermement）将疯人与理性的他者一起隔离；"疯狂"是理性权力运作的产物，是理性为自我确立而必须排除的对立面；知识/权力共同体生产了"正常"与"疯狂"的界限。` },
      { name: "雅克·德里达", era: "法国，20世纪", text: `《我思与疯狂的历史》——笛卡尔无法彻底排除疯狂：即使对疯狂的怀疑也是疯狂可能参与其中的；疯狂不能被彻底排除于理性之外，它是理性的幽灵，在每一次理性的自我确立中已然在场。` },
      { name: "R.D.莱因", era: "苏格兰，20世纪", text: `精神分裂症是对疯狂世界的清醒反应——"正常"的适应本身可能是真正的病态；被称作"疯狂"的人往往是看穿了社会幻象的人；谁是疯子，取决于谁定义了正常，而定义权本身就是权力的问题。` },
      { name: "安托南·阿尔托", era: "法国，20世纪", text: `残酷戏剧与精神病院经历——理性文明压抑了身体与感知的真实力量；"疯狂"有时是对这种压抑的突破，是感知在极限处的爆发；失序不是失败，而是秩序自我解体时另一种生命力的涌现。` }
    ]
  },
  49: {
    divination: `你真正想要的是什么——不是你以为自己想要的，而是那个在意识深处朝向某个方向的意图？每一个意向都同时是一次投射：你看见的"现实"，有多少是你带着自己的欲望和期待塑造出来的？此刻值得追问：你在朝向什么，而那个朝向又如何在悄悄改写你所看见的一切？`,
    philosophers: [
      { name: "埃德蒙德·胡塞尔", era: "德国，19-20世纪", text: `意向性（Intentionalität）是意识的根本结构——意识永远是"关于某物的意识"，没有无对象的纯粹意识；每一个意向行为都将对象构建为它所呈现的样子，意向不只是被动接收，更是主动投射意义的过程。` },
      { name: "弗兰茨·布伦塔诺", era: "奥地利，19世纪", text: `意向内存在（intentional inexistence）——心理活动总是"指向"某个内容，即使该内容在现实中并不存在；爱、恨、期待都有其意向对象；意向是心灵的基本特征，也是我们将愿望投射进世界的根本方式。` },
      { name: "莫里斯·梅洛-庞蒂", era: "法国，20世纪", text: `身体意向性——不是意识"决定"身体去做什么，而是身体有其自身的意向弧（arc intentionnel）；习惯、技能、感知都是具身意向性的形式；我们通过身体朝向世界，投射出去的不只是思想，还有整个具身的存在方式。` },
      { name: "让-保罗·萨特", era: "法国，20世纪", text: `意识是虚无化的力量，它通过投射（projet）朝向可能性——人不是什么，而是"将要成为什么"；每个意向行为都是对当下处境的否定和对未来可能性的筹划，投射就是自由本身的运作方式。` }
    ]
  },
  50: {
    divination: `你是否意识到，你正在一个博弈局中——有其他参与者，有规则，有你看不见的对方策略？这张牌不建议你变得更"精明"，而是邀请你先看清这个局的结构，再决定你想如何参与，或者是否参与。`,
    philosophers: [
      { name: "约翰·冯·诺依曼", era: "匈牙利-美国，20世纪", text: `博弈论奠基人——《博弈论与经济行为》引入零和博弈、混合策略和极小化极大原则；理性行动者在博弈中寻求最优策略，但"最优"取决于其他行动者的选择；博弈结构揭示了合作与冲突的形式逻辑。` },
      { name: "约翰·纳什", era: "美国，20世纪", text: `纳什均衡——在多方博弈中，当所有参与者都无法通过单方面改变策略来改善自身处境时的稳定状态；它不一定是集体最优（如囚徒困境），揭示了理性个体选择与集体结果之间的深刻张力。` },
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `语言游戏（Sprachspiele）——语言的使用是一种受规则约束的活动，如同游戏；不同生活形式有不同的语言游戏，意义在于游戏中的用法，而非对应某个外在实体；理解语言即掌握博弈规则。` },
      { name: "罗杰·凯洛瓦", era: "法国，20世纪", text: `《人与游戏》将游戏分为竞争（agôn）、机遇（aléa）、模拟（mimicry）、眩晕（ilinx）四类——游戏是人类文化的基础，每种博弈类型折射出不同的存在姿态与社会结构。` }
    ]
  },
  51: {
    divination: `此刻你担心的这件事——它在系统中的功能是什么？不是它"应该"是什么，而是它实际在做什么、扮演什么角色？有时我们以为是问题的东西，实际上是某个更大系统的功能性需要。`,
    philosophers: [
      { name: "威廉·詹姆斯", era: "美国，19-20世纪", text: `实用主义（Pragmatism）——观念的意义在于其功能性后果；真理不是符合实在的静态关系，而是观念在经验中"运作"的方式；问"这个观念有什么用"比问"这个观念是否为真"更根本。` },
      { name: "塔尔科特·帕森斯", era: "美国，20世纪", text: `结构功能主义——社会系统的各部分都有维持系统整合的功能（AGIL：适应、目标达成、整合、潜在维持）；分析社会现象就是分析其对系统维持的功能贡献，失调是功能失衡的表现。` },
      { name: "尼克拉斯·卢曼", era: "德国，20世纪", text: `社会系统理论——系统通过功能分化（法律、经济、政治、科学等）来应对复杂性；每个子系统都有其特定功能和二元编码（合法/非法、支付/不支付）；功能不是目的，而是系统的自我再生产方式。` },
      { name: "路德维希·维特根斯坦", era: "奥地利，20世纪", text: `意义即用法（meaning as use）——词语的意义就是其在语言游戏中的功能；没有脱离使用的"纯粹意义"，分析语言就是分析词语在实践中如何运作，这是对"功能"最彻底的哲学化。` }
    ]
  },
  52: {
    divination: `你是否在这件事上感到两可——觉得它既可以这样解读，也可以那样解读，既是这个，又是那个？含混不是你思维不清晰，而是现实本身就带有这种质地。也许此刻不需要消解它，而是学会在含混中行动。`,
    philosophers: [
      { name: "西蒙·德·波伏娃", era: "法国，20世纪", text: `《含混的伦理学》——人的处境本质上是含混的：我们既是自由的主体又是被抛入处境的存在，既是个体又依赖他者；伦理不是消除含混，而是直面并承担这种含混，在其中做出真实的选择。` },
      { name: "莫里斯·梅洛-庞蒂", era: "法国，20世纪", text: `知觉的含混性——感知经验不是清晰的图像，而是图与底（figure-ground）的动态模糊关系；身体既是主体又是客体，这种根本性含混是存在的条件而非缺陷；哲学应该描述而非消除这种含混。` },
      { name: "威廉·燕卜荪", era: "英国，20世纪", text: `《朦胧的七种类型》——文学语言的含混（ambiguity）不是模糊，而是意义的丰富性和多元共存；最好的诗歌在一个词语内承载相互张力的多个意义，含混是语言的最高表达力。` },
      { name: "黑格尔", era: "德国，18-19世纪", text: `辩证法在矛盾中运动——含混（矛盾的共存）不是思维的失败，而是精神运动的动力；正题与反题在对立张力中生成新的综合，含混是辩证运动的原始形态，逻辑的推进从含混开始。` }
    ]
  },
  53: {
    divination: `你真正珍视什么？不是你被告知应该珍视的，也不是你以为自己珍视的——而是在行动中、在选择的瞬间显现出来的那个价值？此刻这张牌邀请你做一次价值的清点。`,
    philosophers: [
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `价值重估（Umwertung aller Werte）——没有客观给定的价值，一切价值都是权力意志的创造；道德的谱系学揭示"善恶"背后的权力关系；新的价值创造需要一种主动的、自我立法的姿态，而非被动接受传统。` },
      { name: "马克斯·舍勒", era: "德国，20世纪", text: `价值现象学——价值是被感受（Fühlen）而非被推论的，价值有客观的等级秩序（生命价值 < 精神价值 < 神圣价值）；怨恨（Ressentiment）是价值意识的一种病态扭曲，使人以否定他人的价值来确立自身。` },
      { name: "G.E.摩尔", era: "英国，20世纪", text: `《伦理学原理》——"善"是不可定义的简单属性（开放性问题论证）；将善还原为自然属性是"自然主义谬误"；价值是直觉把握的非自然属性，不能从事实推导出价值（休谟的是/应然区分）。` },
      { name: "约翰·杜威", era: "美国，19-20世纪", text: `工具主义价值论——价值不是永恒的，而是在具体情境中通过探究（inquiry）确定的；"可珍视的"（prized）与"值得珍视的"（prizeable）之间的区别，是价值评估的核心问题；价值在实践检验中被修正和确立。` }
    ]
  },
  54: {
    divination: `此刻正在发生的，也许不是某个单一原因导致的结果，而是多种力量交织之后涌现出的新质——你无法从任何单一要素中预测它。这张牌提醒你：整体有其自身的逻辑，不要只盯着局部找答案。`,
    philosophers: [
      { name: "亚里士多德", era: "古希腊，公元前4世纪", text: `"整体大于部分之和"——形式（morphē）赋予质料（hylē）以统一性，这个统一性不能还原为各部分的堆叠；生命体的灵魂是身体各部分得以协同运作的形式原理，涌现在亚里士多德这里是形式对质料的组织力量。` },
      { name: "伊利亚·普里戈金", era: "比利时，20世纪", text: `耗散结构理论——远离平衡态的开放系统在能量流动中可以自发产生有序结构（如贝纳德对流、化学振荡）；涌现是复杂性的核心：在临界点，系统突变为具有新属性的更高层次组织，时间的箭头与创造性不可分。` },
      { name: "菲利普·安德森", era: "美国，20世纪", text: `"More is Different"（1972）——每个复杂性层次都有其自身的涌现规律，不能被还原到更低层次的物理定律；超导、磁性、生命的属性不是粒子属性的简单叠加，而是新的涌现秩序；还原论在面对涌现时失效。` },
      { name: "亨利·柏格森", era: "法国，19-20世纪", text: `创化论（L'Évolution créatrice）——生命的演化是真正的创造，涌现出无法从过去预测的新形式；生命冲力（élan vital）不是预定程序的展开，而是在物质阻力中不断涌现的创造性力量；每一个真正的新颖都是涌现。` }
    ]
  },
  55: {
    divination: `你所看见的，真的是事物本来的样子吗？现象向你显现，但显现本身就已经是一种筛选与遮蔽。此刻不妨做一次现象学的还原：暂时悬置你的一切判断与理论，只是如实地回到正在发生的事物本身——它在显现什么，又在遮蔽什么？`,
    philosophers: [
      { name: "伊曼努尔·康德", era: "德国，18世纪", text: `现象（Phänomen）与物自体（Ding an sich）的根本区分——我们只能认识显现给感性与知性的现象，而永远无法企及事物自身；表象不是幻觉，而是人类认识能力的结构性边界；一切经验知识都是关于现象的知识。` },
      { name: "马丁·海德格尔", era: "德国，20世纪", text: `现象学是让存在从遮蔽中解蔽（aletheia，真理即"去蔽"）——现象不只是"外表"，而是"从自身显现自身之物"；但显现总伴随着遮蔽，存在在其显现中同时隐退；哲学的任务是追问那个在表象背后悄然退隐的存在本身。` },
      { name: "埃德蒙德·胡塞尔", era: "德国，19-20世纪", text: `现象学还原（epoché）——悬置对外部世界存在的一切自然态度，回到纯粹意识的意向结构；"回到事物本身"不是回到物质实体，而是回到现象在意识中的显现方式本身；描述现象如其所是，而非解释它为何如此。` },
      { name: "柏拉图", era: "古希腊，公元前5-4世纪", text: `洞穴寓言——囚徒把墙上的影子当作真实，表象遮蔽了理念的光；哲学是从表象世界走向真实世界的上升之路；现象是真实的摹本，理解表象需要追问它所分有的那个更高的真实。` }
    ]
  },
  56: {
    divination: `有某种裁决正在降临，或已在内心悄然发生。也许你正站在某个边界上被审判，或者你自己也在审判着某个对象。流放从不只是地理上的驱逐——最深重的流放，是被自己内心的规则所放逐，成为自身秩序的例外状态。此刻，谁在判决？谁被驱逐？那条边界是真实的，还是权力的建构？`,
    philosophers: [
      { name: "汉娜·阿伦特", era: "德国/美国，20世纪", text: `《极权主义的起源》——无国籍者（stateless persons）失去了"拥有权利的权利"，成为法律保护之外的裸命；流放不是个人失败，而是政治结构对"人"这一身份的剥夺；当人被排除出政治共同体，他也就失去了在世界中拥有一席之地的可能性。` },
      { name: "乔治·阿甘本", era: "意大利，20世纪", text: `《神圣人》（Homo Sacer）——例外状态（stato di eccezione）是主权权力的核心操作：主权者就是那个决定例外的人；被判入例外状态的人成为"裸命"，可以被杀死却不被祭祀；审判与流放揭示了法律秩序内部那个构成性的外部。` },
      { name: "阿尔贝·加缪", era: "法国/阿尔及利亚，20世纪", text: `《局外人》中的默尔索——因不符合社会对"正常悲伤"的期待而被审判，最终被判死刑；荒诞的流放不是身处异乡，而是在自己的世界中无法被理解；加缪的"西西弗"也是流放者：被逐出神的秩序，永远在荒诞中寻找意义。` }
    ]
  },
  57: {
    divination: `偶然性进入了你的生活。这不是命运的预定，而是机遇在敞开的可能性中留下的印记。马拉美说：一掷永不能消除偶然——但这并不悲观，因为正是偶然，让每一次投掷都充满真实的重量。你无法控制骰子的点数，但你可以选择如何去爱这个结果。`,
    philosophers: [
      { name: "斯特凡·马拉美", era: "法国，19世纪", text: `《骰子一掷》（Un Coup de Dés Jamais N'Abolira Le Hasard，1897）——诗歌形式本身就是偶然性的体现：文字散落在页面上，如同骰子散落在海面；"一掷永不能消除偶然"是既悲壮又解放的宣言：承认偶然的不可消除，才能在偶然中找到独特的重量。` },
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `命运之爱（Amor Fati）与永恒回归——真正的肯定不是否定偶然，而是爱上命运的必然性；在《查拉图斯特拉如是说》中，骰子游戏是对生成之偶然性的积极拥抱；神圣的游戏者不试图控制结果，而是以全部意志投入掷出的那一刻。` },
      { name: "吉尔·德勒兹", era: "法国，20世纪", text: `《尼采与哲学》中对骰子一掷的解读——真正的掷骰不是计算概率，而是对偶然性本身的一次性肯定；每一次掷出都肯定了全部偶然；差异不是要被消除的例外，而是创造性生成的动力；随机不是混乱，而是尚未被编码的潜在秩序。` }
    ]
  },
  58: {
    divination: `你正在动用或质疑自己的意志。意志不是单纯的欲望，而是赋予行动以方向和重量的能力。主体性不是给定的起点，而是在行动与选择中不断确立的过程——你是谁，取决于你愿意做什么，以及你如何承担这个选择的后果。此刻，你是在行使意志，还是在回避它？`,
    philosophers: [
      { name: "弗里德里希·尼采", era: "德国，19世纪", text: `权力意志（Wille zur Macht）不是统治他人的欲望，而是生命力量自我超越、自我克服的内在冲动；强健的主体性不在于压制偶然和阻力，而在于将一切阻力转化为自身成长的质料；"成为你所是"（Werde, was du bist）——主体性是一个永恒的自我生成过程。` },
      { name: "约翰·戈特利布·费希特", era: "德国，18-19世纪", text: `自我设定（Ich setzt sich selbst）——主体性的第一原理：自我在设定自身的行动中才成为自我；不是先有自我再有行动，而是行动本身构成了主体；自我同时设定非我（Nicht-Ich）作为阻力，正是在克服非我的过程中，自由的主体性才得以实现。` },
      { name: "让-保罗·萨特", era: "法国，20世纪", text: `存在先于本质——人先存在，再通过选择定义自己是谁；"我们被判定为自由"：自由不是恩赐，而是不可逃避的重负；意志与主体性在每一个选择中被重新确立；逃避选择本身就是一种选择，坏信仰（mauvaise foi）是对自身自由的否认。` }
    ]
  },
  59: {
    divination: `事物正在扩散，或正在聚合。离散是危险还是解放？收敛是秩序还是压缩？这张牌邀请你观察当下的运动方向——不是判断它好坏，而是感受它的动势和边界。意义在播撒中生长，但也在播撒中失去锚点。你现在需要的是扩散，还是找到新的凝聚力？`,
    philosophers: [
      { name: "雅克·德里达", era: "法国/阿尔及利亚，20世纪", text: `播撒（dissémination）——意义不是从中心向外辐射的稳定结构，而是在差异的踪迹网络中无限扩散；《播撒》中德里达指出：文本没有单一起源，意义总是过剩且不可回收；播撒不是错误，而是语言的本质条件——收敛意义是暴力，承认播撒是诚实。` },
      { name: "吉尔·德勒兹 & 费利克斯·瓜塔里", era: "法国，20世纪", text: `块茎（rhizome）对抗树状结构——树从根到枝有固定的层级与中心，块茎则向一切方向延伸、断裂、再生；《千高原》主张：思想和欲望的运动更像块茎——没有起点，没有终点，只有中间、扩散与汇流；离散与收敛在块茎中同时发生。` },
      { name: "本华·曼德布罗特", era: "波兰/法国/美国，20世纪", text: `分形几何（fractal geometry）——自然界中的离散并非无序：海岸线、雪花、肺泡在不同尺度上呈现自相似的结构；局部的离散在更大尺度上呈现收敛的模式；分形挑战了欧氏几何的平滑秩序，揭示出混沌与规律之间那个复杂的中间地带。` }
    ]
  },
  60: {

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let currentSpread    = null;
let shuffledDeck     = [];
let selectedOrder    = [];
let orientations     = [];
let extraCardIdx     = null;
let extraOrient      = true;
let phase            = 'idle';
let waitingForExtra  = false;

// Infinite mode
let isInfiniteMode   = false;
let infiniteMax      = 5;
let infiniteDrawn    = [];   // {cardIdx, isUpright} per draw

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ═══════════════════════════════════════════════════════
   INIT / SPREAD START
═══════════════════════════════════════════════════════ */
function startSpread(type) {
  currentSpread   = SPREADS[type];
  selectedOrder   = [];
  orientations    = [];
  extraCardIdx    = null;
  extraOrient     = true;
  phase           = 'drawing';
  waitingForExtra = false;
  shuffledDeck    = shuffle([...Array(54).keys()]);

  // Switch screens
  document.getElementById('screen-spread').classList.remove('active');
  document.getElementById('screen-deck').classList.add('active');
  document.getElementById('results-overlay').classList.remove('active');

  document.getElementById('instruction').innerHTML =
    `请依次选择<br><span style="font-size:52px;color:#8b3c0a;display:block;line-height:1">${currentSpread.count}</span> 张牌`;
  document.getElementById('progress').textContent = `已选 0 / ${currentSpread.count}`;
  document.getElementById('reveal-btn').style.display = 'none';

  renderGrid();
}

/* ═══════════════════════════════════════════════════════
   RENDER CARD GRID
═══════════════════════════════════════════════════════ */
function renderGrid() {
  const grid = document.getElementById('grid-area');
  grid.innerHTML = '';

  shuffledDeck.forEach(cardIdx => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.cardIdx = cardIdx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <span class="back-c tl">✿</span>
          <span class="back-c tr">✿</span>
          <span class="back-c bl">✿</span>
          <span class="back-c br">✿</span>
          <span class="back-top">哲　学</span>
          <span class="back-orn">❋</span>
          <span class="back-bot">占　卜</span>
        </div>
        <div class="card-front">
          <span class="cf-num">${CARDS[cardIdx].id}</span>
          <span class="cf-sym">${CARDS[cardIdx].sym}</span>
          <div class="cf-name">${CARDS[cardIdx].name}</div>
          ${CARDS[cardIdx].sub ? `<div class="cf-sub">${CARDS[cardIdx].sub}</div>` : ''}
          <div class="cf-kw">${CARDS[cardIdx].kw}</div>
          <div class="cf-hint">${CARDS[cardIdx].hint}</div>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(el, cardIdx));
    grid.appendChild(el);
  });
}

function onCardClick(el, cardIdx) {
  // Infinite mode
  if (isInfiniteMode) {
    if (phase !== 'drawing') return;
    drawInfiniteCard(el, cardIdx);
    return;
  }
  // Route to extra-card pick if waiting
  if (waitingForExtra) {
    if (!el.classList.contains('chosen') && !el.classList.contains('extra-chosen')) {
      onExtraCardClick(el, cardIdx);
    }
    return;
  }
  if (phase !== 'drawing') return;
  if (el.classList.contains('chosen') || el.classList.contains('disabled')) return;
  if (selectedOrder.length >= currentSpread.count) return;

  selectedOrder.push(cardIdx);
  const order = selectedOrder.length;
  el.classList.add('chosen');
  el.dataset.order = order;

  const done  = selectedOrder.length;
  const total = currentSpread.count;
  document.getElementById('progress').textContent = `已选 ${done} / ${total}`;

  if (done === total) {
    document.getElementById('reveal-btn').style.display = 'block';
    document.getElementById('instruction').innerHTML =
      `<span style="font-size:20px;color:#1e1000">选牌完成</span><br>
       <span style="font-size:13px;color:#7a5c2a;line-height:2">点击下方按钮<br>揭示占卜结果</span>`;
    document.querySelectorAll('.card:not(.chosen)').forEach(c => c.classList.add('disabled'));
  }
}

/* ═══════════════════════════════════════════════════════
   SHOW RESULTS
═══════════════════════════════════════════════════════ */
function showResults() {
  phase = 'revealed';

  // Assign random orientations for each selected card
  orientations = selectedOrder.map(() => Math.random() > 0.35); // ~65% upright

  document.getElementById('results-overlay').classList.add('active');
  document.getElementById('res-spread-name').textContent = currentSpread.name;

  const display = document.getElementById('spread-display');
  display.innerHTML = '';

  buildSpreadDisplay(display);

  document.getElementById('extra-btn').style.display = currentSpread.hasExtra ? 'block' : 'none';
  document.getElementById('extra-section').style.display = 'none';
  document.getElementById('extra-result').innerHTML = '';

  // Reset AI section
  document.getElementById('res-ai-input').value = '';
  document.getElementById('res-ai-btn').disabled = true;
  document.getElementById('res-ai-response').textContent = '';
  document.getElementById('res-ai-response').classList.remove('visible');
  document.getElementById('res-key-prompt').style.display = 'none';
}

function buildSpreadDisplay(container) {
  const sp = currentSpread;

  if (sp.layout === 'linear') {
    const row = document.createElement('div');
    row.className = 'spread-linear';
    selectedOrder.forEach((cardIdx, i) => {
      row.appendChild(makeResultWrap(cardIdx, sp.positions[i], orientations[i], i));
    });
    container.appendChild(row);

  } else if (sp.layout === 'cross') {
    const grid = document.createElement('div');
    grid.className = 'spread-cross';
    // positions order: center(0), top(1), bottom(2), left(3), right(4)
    // areas:           ctr,        top,    bot,        lft,     rgt
    selectedOrder.forEach((cardIdx, i) => {
      const wrap = makeResultWrap(cardIdx, sp.positions[i], orientations[i], i);
      wrap.style.gridArea = sp.areas[i];
      grid.appendChild(wrap);
    });
    container.appendChild(grid);

  } else if (sp.layout === 'h') {
    const grid = document.createElement('div');
    grid.className = 'spread-h';
    selectedOrder.forEach((cardIdx, i) => {
      const wrap = makeResultWrap(cardIdx, sp.positions[i], orientations[i], i);
      wrap.style.gridArea = sp.areas[i];
      grid.appendChild(wrap);
    });
    container.appendChild(grid);

  } else if (sp.layout === '9') {
    const grid = document.createElement('div');
    grid.className = 'spread-9';
    selectedOrder.forEach((cardIdx, i) => {
      grid.appendChild(makeResultWrap(cardIdx, sp.positions[i], orientations[i], i));
    });
    container.appendChild(grid);
  }
}

/* ── Build one result card wrapper ── */
function makeResultWrap(cardIdx, position, isUpright, animOrder) {
  const card = CARDS[cardIdx];
  const wrap = document.createElement('div');
  wrap.className = 'result-card-wrap';
  wrap.title = '点击查看大图';

  const rc = document.createElement('div');
  rc.className = 'result-card' + (isUpright ? '' : ' reversed');
  rc.style.animationDelay = `${animOrder * 0.13}s`;

  rc.innerHTML = `
    <div class="card-content-inner">
      <div class="rc-pos">${position}</div>
      <div class="rc-orientation ${isUpright ? 'upright' : 'reversed'}">${isUpright ? '正位' : '逆位'}</div>
      <div class="rc-sym">${card.sym}</div>
      <div class="rc-name">${card.name}</div>
      ${card.sub ? `<div class="rc-sub">${card.sub}</div>` : ''}
      <div class="rc-kw">${card.kw}</div>
      <div class="rc-hint">${card.hint}</div>
    </div>`;

  wrap.appendChild(rc);

  const label = document.createElement('div');
  label.className = 'pos-label';
  label.textContent = position;
  wrap.appendChild(label);

  wrap.addEventListener('click', () => openModal(cardIdx, position, isUpright));
  return wrap;
}

/* ═══════════════════════════════════════════════════════
   EXTRA CARD  (manual pick from remaining deck)
═══════════════════════════════════════════════════════ */
function drawExtra() {
  waitingForExtra = true;

  // Hide results, let user pick from deck
  document.getElementById('results-overlay').classList.remove('active');
  document.getElementById('extra-btn').style.display = 'none';

  document.getElementById('instruction').innerHTML =
    `请选择<br><span style="font-size:52px;color:#5a2880;display:block;line-height:1">补牌</span>`;
  document.getElementById('progress').textContent = '从剩余牌中选择一张';
  document.getElementById('reveal-btn').style.display = 'none';

  // Enable remaining unchosen cards
  document.querySelectorAll('.card:not(.chosen):not(.extra-chosen)').forEach(c => {
    c.classList.remove('disabled');
    c.classList.add('extra-available');
  });
}

function onExtraCardClick(el, cardIdx) {
  if (!waitingForExtra) return;

  waitingForExtra  = false;
  extraCardIdx     = cardIdx;
  extraOrient      = Math.random() > 0.35;

  // Style the picked card
  el.classList.remove('extra-available');
  el.classList.add('extra-chosen');
  el.dataset.order = '补';

  // Lock all other cards
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('extra-available');
    if (!c.classList.contains('chosen') && !c.classList.contains('extra-chosen')) {
      c.classList.add('disabled');
    }
  });

  // Re-show results with extra card
  document.getElementById('results-overlay').classList.add('active');

  const section = document.getElementById('extra-section');
  section.style.display = 'flex';
  section.style.flexDirection = 'column';
  section.style.alignItems = 'center';

  const result = document.getElementById('extra-result');
  result.innerHTML = '';
  result.appendChild(makeResultWrap(extraCardIdx, '', extraOrient, 0));
}

  const card = CARDS[cardIdx];

  document.getElementById('m-pos').textContent    = position;

  document.getElementById('m-orient').className   = 'modal-orient ' + (isUpright ? 'upright' : 'reversed');
  document.getElementById('m-sym').textContent    = card.sym;
  document.getElementById('m-name').textContent   = card.name;
  document.getElementById('m-sub').textContent    = card.sub || '';
  document.getElementById('m-sub').style.display  = card.sub ? 'block' : 'none';
  document.getElementById('m-kw').textContent     = card.kw;
  document.getElementById('m-hint').textContent   = card.hint;

  const lore = LORE[card.id];
  if (lore) {
    document.getElementById('m-divination').textContent = lore.divination;

    philDiv.innerHTML = '';
    lore.philosophers.forEach(p => {
      const entry = document.createElement('div');
      entry.className = 'modal-philosopher';
      entry.innerHTML =
        '<div><span class="modal-philosopher-name">' + p.name + '</span>' +
        '<span class="modal-philosopher-era">' + p.era + '</span></div>' +
        '<div class="modal-philosopher-text">' + p.text + '</div>';
      philDiv.appendChild(entry);

  document.getElementById('card-modal').classList.remove('active');

async function askResAI() {
  const question = document.getElementById('res-ai-input').value.trim();
  if (!question) return;

  const btn  = document.getElementById('res-ai-btn');
  const resp = document.getElementById('res-ai-response');
  btn.disabled = true;
  btn.textContent = '解读中…';
  resp.textContent = '';
  resp.classList.remove('visible');

  // Build context from all drawn cards
  let cardsContext;
  if (currentSpread.layout === 'h') {
    // H spread: positions 0-2 = 主体(过去/当下/走向), 3 = 连接, 4-6 = 客体(过去/当下/走向)
    const hCards = selectedOrder.map((cardIdx, i) => {
      const card = CARDS[cardIdx];
      const ori  = orientations[i] ? '正位' : '逆位';
      const lore = LORE[card.id];
      return { card, ori, lore };
    });
    const timeLabels = ['过去', '当下', '走向'];
    const pairText = timeLabels.map((label, i) => {
      const subj = hCards[i];
      const obj  = hCards[i + 4];
      return `【${label}·对应轴】\n` +
        `  主体·${label}：${subj.card.name}（${subj.ori}）关键词：${subj.card.kw}\n` +
        `  客体·${label}：${obj.card.name}（${obj.ori}）关键词：${obj.card.kw}\n` +
        `  ↔ 客体以「${obj.card.name}」的方式作用于主体，促成主体呈现「${subj.card.name}」；主体以「${subj.card.name}」的方式回应并塑造客体，促成客体呈现「${obj.card.name}」。`;
    }).join('\n\n');
    const bridge = hCards[3];
    cardsContext = pairText + '\n\n' +
      `【主客之连接】${bridge.card.name}（${bridge.ori}）\n关键词：${bridge.card.kw}\n寓意：${bridge.card.hint}${bridge.lore ? '\n解读：' + bridge.lore.divination : ''}`;
  } else {
    cardsContext = selectedOrder.map((cardIdx, i) => {
      const card = CARDS[cardIdx];
      const pos  = currentSpread.positions[i] || `第${i+1}张`;
      const ori  = orientations[i] ? '正位' : '逆位';
      const lore = LORE[card.id];
      return `【${pos}】${card.name}（${ori}）\n关键词：${card.kw}\n寓意：${card.hint}${lore ? '\n解读：' + lore.divination : ''}`;
    }).join('\n\n');
  }

  const hInstruction = currentSpread.layout === 'h'
    ? '\n\n【H牌阵解读要点】同一时间轴上，主体与客体的牌是相互对应、双向构成的关系——不是主体单方面受到客体影响，也不是客体单方面受到主体影响，而是：客体的状态影响并塑造了主体在该时间点上的处境与呈现，同时主体的状态也在塑造和作用于客体。解读时请始终把握这种互构张力，避免把主客分开单独解读。'
    : '';

  const systemPrompt = `你是一位融合哲学深度与直觉智慧的占卜解读师。你的解读风格：文字克制而有力，善用哲学隐喻，不过度安慰也不消极，帮助提问者看到当下处境的多个维度。结合多张牌的整体格局给出综合解读，300-450字，用中文。`;

  const userPrompt = `牌阵名称：${currentSpread.name}${hInstruction}

本次抽到的牌：
${cardsContext}

提问者的问题或情境：
${question}

请结合这个牌阵的整体格局和哲学内核，给出一段有深度的综合占卜解读。`;

  async function callAskAPI(withUserKey) {
    const userApiKey = withUserKey ? localStorage.getItem('zb_apikey') : null;
    return fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userPrompt }
        ],
        ...(userApiKey ? { apiKey: userApiKey } : {})
      })
    });
  }

  try {
    let res = await callAskAPI(true);

    // 用户 key 无效时自动清除并用内置 key 重试
    if (res.status === 401 && localStorage.getItem('zb_apikey')) {
      localStorage.removeItem('zb_apikey');
      const keyInput = document.getElementById && document.querySelector && document.querySelector('#api-key-input');
      res = await callAskAPI(false);
    }

    if (!res.ok) throw new Error('API 错误 ' + res.status);
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '未能获取解读，请稍后重试。';
    resp.textContent = text;
    resp.classList.add('visible');
    resp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // 保存历史（静默，仅登录用户）
    const token = localStorage.getItem('zb_token');
    if (token) {
      const cardsJson = selectedOrder.map((cardIdx, i) => ({
        cardId: CARDS[cardIdx].id, position: currentSpread.positions[i] || `第${i+1}张`, isReversed: !orientations[i]
      }));
      fetch('/api/readings/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ spreadType: currentSpread.name, question, cardsJson, aiReading: text })
      }).catch(() => {});
    }
  } catch (err) {
    resp.textContent = '解读失败，请检查网络或 Key 是否正确。（' + err.message + '）';
    resp.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ AI 解牌 ✦';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── 用户角落按钮 ── */
const userBtn = document.getElementById('user-btn');
// 在按钮旁边插入余额显示
const balanceSpan = document.createElement('span');
balanceSpan.id = 'user-balance';
balanceSpan.style.cssText = 'font-size:12px;color:#c8a050;margin-right:8px;font-family:sans-serif;display:none;';
document.getElementById('user-corner').insertBefore(balanceSpan, userBtn);

function userBtnClick() {
  const token = localStorage.getItem('zb_token');
  if (token) { window.location.href = '/profile.html'; }
  else { window.location.href = '/login.html'; }
}

(async function initUser() {
  const token = localStorage.getItem('zb_token');
  if (!token) return;
  try {
    const res = await fetch('/api/user/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { localStorage.removeItem('zb_token'); return; }
    const me = await res.json();
    userBtn.textContent = '我的';
    balanceSpan.textContent = me.coin_balance + ' 币';
    balanceSpan.style.display = 'inline';
  } catch {}
})();

/* ═══════════════════════════════════════════════════════
   INFINITE MODE
═══════════════════════════════════════════════════════ */
function updateMaxDisplay(val) {
  document.getElementById('max-display').textContent = val;
  const pct = ((val - 1) / 14 * 100).toFixed(1) + '%';
  document.getElementById('max-slider').style.setProperty('--pct', pct);
}

function showMaxModal() {
  document.getElementById('max-modal').classList.add('active');
  updateMaxDisplay(document.getElementById('max-slider').value);
}

function closeMaxModal() {
  document.getElementById('max-modal').classList.remove('active');
}

function startInfinite() {
  infiniteMax    = parseInt(document.getElementById('max-slider').value);
  infiniteDrawn  = [];
  isInfiniteMode = true;
  phase          = 'drawing';
  shuffledDeck   = shuffle([...Array(54).keys()]);

  document.getElementById('max-modal').classList.remove('active');
  document.getElementById('screen-spread').classList.remove('active');
  document.getElementById('screen-deck').classList.add('active', 'infinite-active');
  document.getElementById('results-overlay').classList.remove('active');

  // Right panel
  document.getElementById('instruction').innerHTML =
    `点击任意牌<br><span style="font-size:13px;color:#7a5c2a;display:block;line-height:2">可重复翻牌</span>`;
  document.getElementById('progress').style.display = 'none';
  document.getElementById('reveal-btn').style.display = 'none';

  // Bottom bar
  const bar = document.getElementById('infinite-bar');
  bar.classList.add('active');
  document.getElementById('infinite-bar-cards').innerHTML = '';
  document.getElementById('infinite-counter').textContent = `已翻 0 / ${infiniteMax} 张`;
  document.getElementById('infinite-done-btn').style.display = 'none';

  renderGrid();
}

function drawInfiniteCard(el, cardIdx) {
  if (infiniteDrawn.length >= infiniteMax) return;

  // Pick a truly random card each click, different from the last drawn
  const lastIdx = infiniteDrawn.length > 0 ? infiniteDrawn[infiniteDrawn.length - 1].cardIdx : -1;
  let newIdx;
  do { newIdx = Math.floor(Math.random() * 54); } while (newIdx === lastIdx);
  cardIdx = newIdx;

  const isUpright = Math.random() > 0.35;
  infiniteDrawn.push({ cardIdx, isUpright });
  const n = infiniteDrawn.length;

  // Flash card briefly
  el.classList.add('flash');
  el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });

  // Update counter
  document.getElementById('infinite-counter').textContent = `已翻 ${n} / ${infiniteMax} 张`;

  // Build card in bottom bar using the same result-card style
  const wrap = document.createElement('div');
  wrap.className = 'ibar-card-wrap';
  wrap.style.animationDelay = '0s';

  const rc = document.createElement('div');
  rc.className = 'result-card' + (isUpright ? '' : ' reversed');
  const card = CARDS[cardIdx];
  rc.innerHTML = `
    <div class="card-content-inner">
      <div class="rc-pos">第 ${n} 张</div>
      <div class="rc-orientation ${isUpright ? 'upright' : 'reversed'}">${isUpright ? '正位' : '逆位'}</div>
      <div class="rc-sym">${card.sym}</div>
      <div class="rc-name">${card.name}</div>
      ${card.sub ? `<div class="rc-sub">${card.sub}</div>` : ''}
      <div class="rc-kw">${card.kw}</div>
      <div class="rc-hint">${card.hint}</div>
    </div>`;
  rc.addEventListener('click', () => openModal(cardIdx, `第 ${n} 张`, isUpright));

  wrap.appendChild(rc);
  document.getElementById('infinite-bar-cards').appendChild(wrap);

  // Scroll the bar to show latest card
  wrap.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' });

  // Done?
  if (n >= infiniteMax) {
    phase = 'revealed';
    document.getElementById('instruction').innerHTML =
      `<span style="font-size:16px;color:#1e1000">翻牌完成</span><br>
       <span style="font-size:12px;color:#7a5c2a;line-height:2">点击底部卡牌查看大图</span>`;
    document.querySelectorAll('.card').forEach(c => c.classList.add('disabled'));
    document.getElementById('infinite-done-btn').style.display = 'block';
  }
}

/* ═══════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════ */
function goToSpreadSelect() {
  document.getElementById('results-overlay').classList.remove('active');
  document.getElementById('screen-deck').classList.remove('active', 'infinite-active');
  document.getElementById('screen-cards').classList.remove('active');
  document.getElementById('screen-spread').classList.add('active');
  document.getElementById('infinite-bar').classList.remove('active');
  document.getElementById('infinite-bar-cards').innerHTML = '';
  document.getElementById('progress').style.display = '';
  isInfiniteMode = false;
  infiniteDrawn  = [];
  closeModal();
}

function showAllCards() {
  document.getElementById('screen-spread').classList.remove('active');
  document.getElementById('screen-cards').classList.add('active');

  const grid = document.getElementById('cards-browser-grid');
  if (grid.children.length > 0) return; // already built

  CARDS.forEach(card => {
    const el = document.createElement('div');
    el.className = 'browser-card';
    el.innerHTML = `
      <span class="bc-num">${card.id}</span>
      <div class="bc-sym">${card.sym}</div>
      <div class="bc-name">${card.name}</div>
      ${card.sub ? `<div class="bc-sub">${card.sub}</div>` : ''}
      <div class="bc-kw">${card.kw}</div>
      <div class="bc-hint">${card.hint}</div>`;
    el.addEventListener('click', () => openModal(card.id - 1, card.name, true));
    grid.appendChild(el);
  });
}

function resetApp() {
  waitingForExtra = false;
  selectedOrder   = [];
  orientations    = [];
  extraCardIdx    = null;
  phase           = 'idle';
  isInfiniteMode  = false;
  infiniteDrawn   = [];

  document.getElementById('results-overlay').classList.remove('active');
  document.getElementById('progress').style.display = '';
  document.getElementById('infinite-bar').classList.remove('active');
  document.getElementById('infinite-bar-cards').innerHTML = '';
  document.getElementById('screen-deck').classList.remove('infinite-active');
  // Remove any appended reset button
  const rp = document.getElementById('right-panel');
  rp.querySelectorAll('.res-btn').forEach(b => b.remove());

  closeModal();
  goToSpreadSelect();
}

/* ── Boot ── */
// Overlay is visible by default, nothing else needed
</script>
